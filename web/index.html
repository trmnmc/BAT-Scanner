<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BaT Value Map</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1115; color: #e7e9ee;
  }
  header { padding: 14px 18px 6px; }
  h1 { font-size: 18px; font-weight: 600; margin: 0; }
  .sub { font-size: 12px; color: #9aa0ad; margin-top: 3px; }
  .controls { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; padding: 8px 18px 4px; font-size: 13px; }
  .controls label { color: #9aa0ad; }
  select { background: #1a1d24; color: #e7e9ee; border: 1px solid #2a2e38; border-radius: 6px; padding: 5px 8px; font-size: 13px; }
  #chart { width: 100%; height: 78vh; min-height: 480px; }
  #status { padding: 24px 18px; color: #9aa0ad; font-size: 14px; line-height: 1.6; }
  code { background: #1a1d24; padding: 1px 6px; border-radius: 4px; }
  .hint { padding: 2px 18px 10px; font-size: 12px; color: #7b8190; }
  /* --- filter bar + saved-view / preset chips (pivot) --- */
  .filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 4px 18px; font-size: 13px; }
  .filters input[type=number] { width: 92px; }
  .filters input, .filters button { background: #1a1d24; color: #e7e9ee; border: 1px solid #2a2e38;
                                     border-radius: 6px; padding: 5px 8px; font-size: 13px; }
  .filters input::placeholder { color: #6b7280; }
  .filters label { color: #9aa0ad; display: inline-flex; align-items: center; gap: 4px; }
  .filters button { cursor: pointer; }
  .filters button:hover { background: #22262f; }
  #f-count { padding: 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 18px 8px; }
  .chip { cursor: pointer; font-size: 12px; padding: 3px 10px; border-radius: 999px;
          background: #1a1d24; color: #c7ccd6; border: 1px solid #2a2e38; }
  .chip:hover { background: #22262f; }
  .chip.active { background: #5b8def; color: #0f1115; border-color: #5b8def; font-weight: 600; }
  .chip .x { color: #7b8190; margin-left: 6px; }
  .chip.preset { border-style: dashed; }
  /* --- ending-soon ticker (Phase 1) --- */
  #ticker { position: relative; overflow: hidden; white-space: nowrap; display: flex;
            align-items: stretch; height: 46px; background: #12141a;
            border-top: 1px solid #1c1f27; border-bottom: 1px solid #1c1f27; }
  #ticker[hidden] { display: none; }
  .ticker-label { flex: 0 0 auto; z-index: 2; display: flex; align-items: center; gap: 6px;
                  padding: 0 14px; font-size: 12px; font-weight: 600; color: #c7ccd6;
                  background: #12141a; border-right: 1px solid #1c1f27; }
  .ticker-label .deals { color: #ffd54a; }
  .ticker-viewport { overflow: hidden; flex: 1 1 auto; display: flex; align-items: center; }
  .ticker-track { display: inline-flex; align-items: center;
                  animation: ticker-marquee linear infinite; will-change: transform; }
  #ticker:hover .ticker-track, #ticker.paused .ticker-track { animation-play-state: paused; }
  @keyframes ticker-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .ticker-chip { display: inline-flex; align-items: center; gap: 8px; flex: 0 0 auto;
                 padding: 4px 14px; border-right: 1px solid #1c1f27;
                 text-decoration: none; color: #e7e9ee; font-size: 12px; line-height: 1.2; }
  .ticker-chip:hover { background: #1a1d24; }
  .ticker-chip.deal { background: rgba(255,213,74,0.09); }
  .ticker-chip img { width: 40px; height: 28px; object-fit: cover; border-radius: 4px;
                     background: #1a1d24; flex: 0 0 auto; }
  .ticker-name { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .ticker-bid { color: #c7ccd6; }
  .ticker-deal { color: #ffd54a; font-weight: 600; }
  .ticker-deal.above { color: #9aa0ad; font-weight: 400; }
  .ticker-thin { color: #6b7280; }
  .ticker-miles { color: #c7ccd6; background: #1f232c; border-radius: 3px; padding: 1px 5px; font-size: 11px; }
  .ticker-miles.tmu { color: #e0a13a; }
  .ticker-flag { color: #ffb3a7; background: rgba(226,85,59,0.18); border-radius: 3px;
                 padding: 1px 5px; font-size: 10px; font-weight: 700; letter-spacing: .2px; }
  .ticker-good { color: #28b487; font-size: 10px; font-weight: 600; }
  /* hover preview: big detailed photo when you hover a ticker chip */
  #ticker-preview { position: fixed; z-index: 50; pointer-events: none;
                    background: #16181f; border: 1px solid #2a2e38; border-radius: 10px;
                    padding: 6px; box-shadow: 0 12px 32px rgba(0,0,0,.55); }
  #ticker-preview[hidden] { display: none; }
  #ticker-preview img { width: 460px; height: 307px; object-fit: cover; border-radius: 6px; display: block; background: #1a1d24; }
  #ticker-preview .cap { font-size: 13px; color: #e7e9ee; margin-top: 6px; max-width: 460px; }
  .ticker-clock { color: #9aa0ad; font-variant-numeric: tabular-nums; min-width: 52px; }
  .ticker-clock.urgent { color: #e2553b; font-weight: 600; }
  .ticker-tag { background: #ffd54a; color: #0f1115; font-weight: 700; font-size: 10px;
                padding: 1px 5px; border-radius: 3px; }
  .ticker-delta { font-size: 10px; font-weight: 700; margin-left: 1px; }
  .ticker-delta.up { color: #28b487; }
  .ticker-delta.down { color: #e2553b; }
  @keyframes chip-flash-up   { from { background: rgba(40,180,135,0.45); } to { background: transparent; } }
  @keyframes chip-flash-down { from { background: rgba(226,85,59,0.45);  } to { background: transparent; } }
  .ticker-chip.flash-up   { animation: chip-flash-up   1.8s ease-out 1; }
  .ticker-chip.flash-down { animation: chip-flash-down 1.8s ease-out 1; }
  @media (prefers-reduced-motion: reduce) {
    .ticker-track { animation: none; }
    .ticker-viewport { overflow-x: auto; }
    .ticker-chip.flash-up, .ticker-chip.flash-down { animation: none; }
  }
  /* --- Map / List view toggle --- */
  .seg { display: inline-flex; border: 1px solid #2a2e38; border-radius: 6px; overflow: hidden; }
  .seg button { background: #1a1d24; color: #c7ccd6; border: 0; padding: 5px 12px; font-size: 13px; cursor: pointer; }
  .seg button.active { background: #5b8def; color: #0f1115; font-weight: 600; }
  /* --- clickable car detail card (stays until dismissed) --- */
  #card { position: fixed; top: 64px; right: 16px; z-index: 60; width: 340px; max-width: calc(100vw - 32px);
          background: #16181f; border: 1px solid #2a2e38; border-radius: 12px; padding: 12px;
          box-shadow: 0 16px 40px rgba(0,0,0,.55); font-size: 13px; }
  #card[hidden] { display: none; }
  #card .card-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; background: #1a1d24; display: block; }
  #card .card-close { position: absolute; top: 8px; right: 10px; cursor: pointer; color: #fff;
                      background: rgba(0,0,0,.55); border-radius: 50%; width: 26px; height: 26px;
                      display: flex; align-items: center; justify-content: center; font-size: 14px; line-height: 1; }
  #card .card-title { font-weight: 600; font-size: 15px; margin: 10px 0 6px; }
  #card .card-row { color: #c7ccd6; margin: 4px 0; }
  #card .card-bid { font-size: 18px; font-weight: 700; color: #e7e9ee; }
  #card .card-clock { font-variant-numeric: tabular-nums; font-weight: 600; }
  #card .card-clock.urgent { color: #e2553b; }
  #card .card-deal { color: #ffd54a; font-weight: 600; }
  #card .card-flag { color: #ffb3a7; }
  #card .card-good { color: #28b487; }
  .card-muted { color: #9aa0ad; }
  .btn-link { display: block; text-align: center; margin-top: 10px; padding: 9px; border-radius: 8px;
              background: #5b8def; color: #0f1115; font-weight: 600; text-decoration: none; }
  .btn-link:hover { background: #6f9bf0; }
  /* --- sortable list view --- */
  #listpanel { padding: 4px 18px 28px; }
  #listpanel[hidden] { display: none; }
  table.listtbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.listtbl th { text-align: left; color: #9aa0ad; font-weight: 600; padding: 8px 10px;
                     border-bottom: 1px solid #2a2e38; cursor: pointer; white-space: nowrap;
                     position: sticky; top: 0; background: #0f1115; }
  table.listtbl th.num { text-align: right; }
  table.listtbl th:hover { color: #e7e9ee; }
  table.listtbl th.sorted { color: #e7e9ee; }
  table.listtbl th.sorted::after { content: " ▾"; color: #5b8def; }
  table.listtbl th.sorted.asc::after { content: " ▴"; }
  table.listtbl td { padding: 7px 10px; border-bottom: 1px solid #181b22; vertical-align: middle; }
  table.listtbl td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.listtbl tbody tr { cursor: pointer; }
  table.listtbl tbody tr:hover { background: #1a1d24; }
  .lt-img { width: 56px; height: 40px; object-fit: cover; border-radius: 4px; background: #1a1d24; flex: 0 0 auto; }
  .lt-name { font-weight: 500; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lt-deal { color: #ffd54a; font-weight: 600; }
  .lt-over { color: #9aa0ad; }
  .lt-urgent { color: #e2553b; font-weight: 600; }
</style>
</head>
<body>
<header>
  <h1>BaT Value Map</h1>
  <div class="sub" id="meta">loading…</div>
</header>
<div class="controls">
  <span><label for="ymetric">Heat axis:</label>
    <select id="ymetric">
      <option value="comments">Comments</option>
      <option value="watchers">Watchers</option>
      <option value="deal">Deal % vs comps</option>
    </select>
  </span>
  <span><label for="xmetric">Price axis:</label>
    <select id="xmetric">
      <option value="log">Log</option>
      <option value="linear">Linear</option>
    </select>
  </span>
  <span><label for="markers">Markers:</label>
    <select id="markers">
      <option value="dots">Dots</option>
      <option value="photos">Photos</option>
    </select>
  </span>
  <span><label>View:</label>
    <span class="seg">
      <button id="view-map" class="active" type="button">Map</button>
      <button id="view-list" type="button">List</button>
    </span></span>
  <span class="hint">Legend toggles a category · hover for the photo · click a car for details · scroll or pinch to zoom · box-zoom &amp; reset top-right · double-click to reset</span>
</div>
<div class="filters">
  <input id="f-make" placeholder="make(s), e.g. porsche toyota" list="makes" autocomplete="off">
  <datalist id="makes"></datalist>
  <input id="f-yearmin" type="number" inputmode="numeric" placeholder="year ≥">
  <input id="f-yearmax" type="number" inputmode="numeric" placeholder="year ≤">
  <input id="f-pricemax" type="number" inputmode="numeric" placeholder="max $">
  <input id="f-milesmax" type="number" inputmode="numeric" placeholder="max mi">
  <label><input type="checkbox" id="f-noreserve"> No reserve</label>
  <label><input type="checkbox" id="f-deals"> Deals only</label>
  <button id="f-clear" type="button">Clear</button>
  <button id="f-save" type="button">★ Save view</button>
  <span id="f-count" class="hint"></span>
</div>
<div class="chips" id="chips"></div>
<div id="ticker" hidden></div>
<div id="chart"></div>
<div id="listpanel" hidden></div>
<div id="status"></div>
<div id="ticker-preview" hidden><img alt="" referrerpolicy="no-referrer"><div class="cap"></div></div>
<div id="card" hidden></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script src="./filters.js"></script>
<script>
const DATA_PATHS = ["../data/auctions.json", "./auctions.json"];
const CATEGORY_COLORS = {
  "air-cooled-911-family": "#5b8def",
  "60s-muscle":            "#e2553b",
  "80s-90s-japanese":      "#28b487",
  "vintage-trucks":        "#c9943a",
  "german-wagons":         "#9b6cd6",
};
const CATEGORY_LABELS = {
  "air-cooled-911-family": "Air-cooled 911",
  "60s-muscle":            "60s muscle",
  "80s-90s-japanese":      "80s–90s JDM",
  "vintage-trucks":        "Vintage trucks",
  "german-wagons":         "German wagons",
};

const statusEl = document.getElementById("status");
const metaEl = document.getElementById("meta");
const chart = echarts.init(document.getElementById("chart"), "dark");
window.addEventListener("resize", () => chart.resize());

// --- Cursor-anchored zoom (wheel + trackpad pinch). ECharts' built-in inside-zoom
// anchors at the pointer for a plain wheel but IGNORES a Mac trackpad pinch (which
// Chrome delivers as ctrl+wheel) — the browser then page-zooms toward a fixed point,
// which is the "it always zooms into the same spot" complaint. We disable the built-in
// wheel zoom (see dataZoom config) and drive zoom ourselves in DATA space via
// startValue/endValue so the point under the cursor stays put — correctly on both the
// log and linear x-axis. Drag-to-pan (moveOnMouseMove) is left to ECharts.
(function setupCursorZoom() {
  const dom = chart.getDom();
  const full = {};                 // full data extent per axis, cached while fully zoomed out

  function axisDZ() {
    const dz = chart.getOption().dataZoom || [];
    let xi = -1, yi = -1;
    dz.forEach((d, i) => {
      if (xi < 0 && d.xAxisIndex != null && (!Array.isArray(d.xAxisIndex) || d.xAxisIndex.length)) xi = i;
      if (yi < 0 && d.yAxisIndex != null && (!Array.isArray(d.yAxisIndex) || d.yAxisIndex.length)) yi = i;
    });
    return { dz, xi, yi };
  }

  function zoomAxis(axisType, dzIdx, px, py, factor, dz) {
    const am = chart.getModel().getComponent(axisType, 0);
    if (!am) return;
    const isLog = am.get("type") === "log";
    const ext = am.axis.scale.getExtent();
    const vmin = ext[0], vmax = ext[1];
    const d = chart.convertFromPixel({ gridIndex: 0 }, [px, py]);
    const vc = axisType === "xAxis" ? d[0] : d[1];
    if (!isFinite(vc)) return;
    const z = dz[dzIdx];             // cache the full extent so zoom-out can't exceed the data
    if ((z.start == null || z.start <= 0.1) && (z.end == null || z.end >= 99.9)) full[axisType] = [vmin, vmax];
    const cap = full[axisType];
    let nmin, nmax;
    if (isLog) {
      const L = Math.log, E = Math.exp, lc = L(vc), lo = L(vmin), hi = L(vmax);
      nmin = E(lc - (lc - lo) * factor); nmax = E(lc + (hi - lc) * factor);
    } else {
      nmin = vc - (vc - vmin) * factor; nmax = vc + (vmax - vc) * factor;
    }
    if (cap) { nmin = Math.max(nmin, cap[0]); nmax = Math.min(nmax, cap[1]); }
    if (nmax > nmin) chart.dispatchAction({ type: "dataZoom", dataZoomIndex: dzIdx, startValue: nmin, endValue: nmax });
  }

  // We ONLY intercept trackpad pinch (Mac delivers it as ctrl+wheel), which ECharts'
  // native zoom ignores — letting the browser page-zoom to a fixed point. Plain wheel /
  // two-finger scroll is left to ECharts' native, reliable cursor zoom. dispatchAction
  // updates the scale synchronously, so a burst of pinch events still anchors exactly.
  dom.addEventListener("wheel", (e) => {
    if (!e.ctrlKey) return;          // plain wheel -> ECharts native zoom handles it
    const gc = chart.getModel().getComponent("grid", 0);
    const cs = gc && gc.coordinateSystem;
    if (!cs) return;
    const r = cs.getRect(), b = dom.getBoundingClientRect();
    const px = e.clientX - b.left, py = e.clientY - b.top;
    if (px < r.x || px > r.x + r.width || py < r.y || py > r.y + r.height) return;  // over margins: let the page scroll
    e.preventDefault();             // stop the browser page-zoom on pinch
    let f = Math.exp(e.deltaY * 0.012);      // pinch deltas are tiny; deltaY<0 (pinch out) -> f<1 -> zoom in
    f = Math.min(1.4, Math.max(0.7, f));     // clamp per event so a fast pinch can't jump
    const { dz, xi, yi } = axisDZ();
    if (xi >= 0) zoomAxis("xAxis", xi, px, py, f, dz);
    if (yi >= 0) zoomAxis("yAxis", yi, px, py, f, dz);
  }, { passive: false });
})();

let SNAPSHOT = null;
let FILTERED = [];                       // cars passing the current filter (drives map + list)
let listView = false;                    // Map vs List view
let listSort = { key: "ends", dir: "asc" };   // List default: ending soonest first

async function loadData() {
  for (const p of DATA_PATHS) {
    try {
      const r = await fetch(p, { cache: "no-store" });
      if (r.ok) return await r.json();
    } catch (e) { /* try next */ }
  }
  return null;
}

const CURRENCY_SYMBOLS = { USD: "$", EUR: "€", GBP: "£" };
function fmtMoney(n, currency) {
  if (n == null) return "—";
  const num = Number(n).toLocaleString();
  const sym = CURRENCY_SYMBOLS[currency || "USD"];
  return sym ? sym + num : (currency ? escapeHTML(currency) + " " : "$") + num;
}
function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g,
    c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
// A car is "scoreable" only with enough same make+model comps; thin-comp cars never
// show a deal % or green coloring (the honesty gate from the design doc).
const SCOREABLE_BASES = { "make-model-y3": 1, "make-model-y7": 1 };
function isScoreable(v) {
  return !!(v && v.fair_value && SCOREABLE_BASES[v.basis] && v.deal_pct != null);
}

// Phase 4: mileage + condition badges (the "kill the wasted scroll" signal).
const COND_LABELS = {
  restomod: "RESTOMOD", replica: "REPLICA", tribute: "TRIBUTE", "kit-car": "KIT CAR",
  modified: "MODIFIED", "engine-swap": "ENGINE SWAP", project: "PROJECT",
  "salvage-title": "SALVAGE", "rebuilt-engine": "REBUILT ENGINE", repaint: "REPAINT",
  "numbers-matching": "#s-MATCHING", "original-paint": "ORIG PAINT",
};
const COND_GOOD = { "numbers-matching": 1, "original-paint": 1 };
function condSplit(condition) {
  const bad = [], good = [];
  for (const f of condition || []) (COND_GOOD[f] ? good : bad).push(COND_LABELS[f] || f.toUpperCase());
  return { bad, good };
}
function fmtMiles(d) {
  if (!d || d.miles == null) return (d && d.tmu) ? "TMU" : null;
  const s = d.miles >= 10000 ? Math.round(d.miles / 1000) + "k mi" : d.miles.toLocaleString() + " mi";
  return d.tmu ? s + " · TMU" : s;
}

// Plots the cars passed in (already filtered). Untagged cars go in a gray "Other" series
// so the WHOLE board shows, not just the taste categories. A car only plots if it has the
// chosen Y value — we never fake a 0 for unknown engagement (honest, like the deal axis).
function buildSeries(cars, yMetric, markers) {
  const usePhotos = markers === "photos";
  const OTHER = "__other";
  const byCat = {};
  for (const a of cars) {
    const price = a.bid && a.bid.amount;
    if (!price || price <= 0) continue;                 // log axis needs price > 0
    let heat;
    if (yMetric === "deal") {
      if (!a.value || a.value.deal_pct == null) continue;   // only cars with a comp estimate
      if (!(a.flags && a.flags.no_reserve)) continue;       // deal axis = real discounts: a reserve
      heat = Math.round(a.value.deal_pct * 100);            // bid isn't a price, so "% under" is bogus
    } else {
      const e = a.engagement && a.engagement[yMetric];
      if (e == null) continue;                              // unknown engagement: don't fake a 0
      heat = e;
    }
    const photo = usePhotos && a.thumbnail_url;
    const isDeal = !!(a.value && a.value.is_deal);          // ending soon + under comps + enough comps
    const dotSize = isDeal ? 19 : 13;
    const cats = (a.category_ids && a.category_ids.length) ? a.category_ids : [OTHER];
    for (const cid of cats) {
      const color = CATEGORY_COLORS[cid] || "#6b7280";     // untagged -> gray
      (byCat[cid] = byCat[cid] || []).push({
        value: [price, heat],
        symbol: photo ? "image://" + a.thumbnail_url : "circle",
        symbolSize: photo ? [48, 36] : dotSize,
        itemStyle: photo
          ? { borderColor: isDeal ? "#ffd54a" : color, borderWidth: isDeal ? 3 : 2 }
          : { color: color, opacity: 0.85,
              borderColor: isDeal ? "#ffd54a" : "#0f1115", borderWidth: isDeal ? 3 : 1 },
        _t: a.title, _y: a.year, _p: price, _cur: a.bid && a.bid.currency,
        _c: (a.engagement && a.engagement.comments),
        _w: (a.engagement && a.engagement.watchers),
        _img: a.thumbnail_url, _url: a.listing_url, _v: a.value, _d: a.details,
        _nr: !!(a.flags && a.flags.no_reserve),
        _end: a.ends_at || null,                    // deadline: a bid is meaningless without time left
      });
    }
  }
  return Object.keys(byCat).sort().map(cid => ({
    name: cid === OTHER ? "Other" : (CATEGORY_LABELS[cid] || cid),
    type: "scatter",
    data: byCat[cid],
    color: CATEGORY_COLORS[cid] || "#6b7280",
    emphasis: { focus: "series" },
    large: true, largeThreshold: 400,            // whole board can be ~1k points
  }));
}

function render() {
  const yMetric = document.getElementById("ymetric").value;
  const xType = document.getElementById("xmetric").value === "linear" ? "value" : "log";
  const markers = document.getElementById("markers").value;
  const spec = currentSpec();
  const all = SNAPSHOT.auctions;
  const cars = window.BATFilters ? BATFilters.filterCars(all, spec) : all;
  FILTERED = cars;                          // shared with the List view
  updateFilterReadout(cars, all, spec);
  if (listView) renderList();
  const series = buildSeries(cars, yMetric, markers);
  chart.setOption({
    animationDurationUpdate: 0,   // instant, cursor-tight zoom/pan response
    tooltip: {
      trigger: "item",
      backgroundColor: "#16181f", borderColor: "#2a2e38", textStyle: { color: "#e7e9ee" },
      formatter: (p) => {
        const d = p.data;
        const img = d._img ? `<img src="${escapeHTML(d._img)}" style="width:200px;border-radius:6px;display:block;margin-bottom:6px">` : "";
        let vline = "";
        const v = d._v;
        if (v && v.fair_value) {
          const below = v.deal_pct != null ? Math.round(v.deal_pct * 100) : null;
          vline = `Fair value: ${fmtMoney(v.fair_value, d._cur)} <span style="color:#9aa0ad">(${v.n_comps} comps, ${v.basis})</span><br>`;
          if (d._nr && below != null) {            // discount only means something on a no-reserve car
            vline += `Bid is <b>${below >= 0 ? below + "% below" : (-below) + "% above"}</b> comps`
              + (v.is_deal ? ` · <b style="color:#ffd54a">DEAL — ending soon</b>` : "") + `<br>`;
          } else if (!d._nr) {
            vline += `<span style="color:#9aa0ad">Reserve auction — bid may be below reserve, not a discount</span><br>`;
          }
          if (v.appreciation_pct != null) vline += `Recent trend: ${v.appreciation_pct >= 0 ? "+" : ""}${Math.round(v.appreciation_pct * 100)}%<br>`;
        }
        let dline = "";
        const det = d._d;
        if (det) {
          const miles = fmtMiles(det), cs = condSplit(det.condition), parts = [];
          if (miles) parts.push(miles);
          if (cs.bad.length) parts.push(`<span style="color:#e2553b">🚩 ${cs.bad.join(", ")}</span>`);
          if (cs.good.length) parts.push(`<span style="color:#28b487">${cs.good.join(", ")}</span>`);
          if (parts.length) dline = parts.join(" · ") + "<br>";
        }
        let tline = "";
        const endMs = d._end ? Date.parse(d._end) : NaN;
        if (endMs) {
          const left = endMs - Date.now();
          const col = left > 0 && left <= 3600 * 1000 ? "#e2553b" : "#c7ccd6";
          tline = left > 0
            ? `<span style="color:${col}">Ends in ${fmtCountdown(left)}</span><br>`
            : `<span style="color:#9aa0ad">Auction ended</span><br>`;
        }
        return `${img}<b>${escapeHTML(d._t)}</b><br>`
          + `Bid: ${fmtMoney(d._p, d._cur)}<br>`
          + tline
          + dline
          + `Comments: ${d._c ?? "—"} · Watchers: ${d._w ?? "—"}<br>`
          + vline
          + `<span style="color:#9aa0ad">click for details</span>`;
      },
    },
    legend: {
      top: 4, textStyle: { color: "#c7ccd6" }, inactiveColor: "#4a4f5a",
    },
    grid: { left: 64, right: 28, top: 44, bottom: 56 },
    xAxis: {
      type: xType, name: "Bid price", nameLocation: "middle", nameGap: 34,
      axisLabel: { formatter: (v) => "$" + (v >= 1000 ? (v/1000) + "k" : v) },
      splitLine: { lineStyle: { color: "#1c1f27" } },
      min: xType === "log" ? 1000 : 0,
      // Pin the top to the data. The "nice" max sits above the priciest car, and ECharts
      // snaps any zoom whose endValue lands in that empty band back to full — which broke
      // cursor-anchored zoom-in. No padding above the data, no snap.
      max: "dataMax",
    },
    yAxis: {
      type: "value",
      name: yMetric === "deal" ? "% under comps →"
        : (yMetric === "watchers" ? "Watchers" : "Comments") + " (heat) →",
      nameLocation: "middle", nameGap: 44,
      splitLine: { lineStyle: { color: "#1c1f27" } },
      // Pin to the data range too — same snap-on-zoom issue as the x-axis padding.
      min: "dataMin", max: "dataMax",
    },
    // Three ways to zoom, so it never feels broken: ECharts' native wheel zoom
    // (reliable across mice/trackpads), the box-zoom tool below (drag a rectangle —
    // foolproof), and setupCursorZoom() which only intercepts trackpad PINCH
    // (ctrl+wheel) to stop the browser page-zooming. moveOnMouseMove = drag to pan.
    toolbox: {
      show: true, right: 12, top: 34, itemGap: 10,
      iconStyle: { borderColor: "#9aa0ad" },
      emphasis: { iconStyle: { borderColor: "#e7e9ee" } },
      feature: {
        dataZoom: { filterMode: "none", title: { zoom: "Box zoom — drag a box", back: "Undo zoom" } },
        restore: { title: "Reset zoom" },
      },
    },
    dataZoom: [
      { type: "inside", xAxisIndex: 0, filterMode: "none", zoomOnMouseWheel: true, moveOnMouseWheel: false },
      { type: "inside", yAxisIndex: 0, filterMode: "none", zoomOnMouseWheel: true, moveOnMouseWheel: false },
    ],
    series,
  }, true);
}

// --- Ending-soon ticker (Phase 1): built from the snapshot we already loaded (zero new fetch).
// Window is 48h to match the is_deal definition, so every flagged deal appears. Scoped to the
// taste categories (like the map). The countdown is the only genuinely-live element.
const TICKER_WINDOW_MS = 48 * 3600 * 1000;
const TICKER_MAX = 60;            // cap chips so the marquee stays glanceable (deals sort first)
let tickerTimer = null;

function buildTicker(snapshot) {
  const el = document.getElementById("ticker");
  if (!el || !snapshot || !snapshot.auctions) return;
  const now = Date.now();
  let items = [];
  for (const a of snapshot.auctions) {
    // whole board (pivot): ending-soon cars across every make, not just the taste categories,
    // so the ticker surfaces every deal. Deals (no-reserve, under comps) sort to the front.
    const price = a.bid && a.bid.amount;
    if (!price || price <= 0) continue;
    const endMs = a.ends_at ? Date.parse(a.ends_at) : NaN;
    if (!endMs || endMs <= now || endMs - now > TICKER_WINDOW_MS) continue;  // ending within window, not ended
    const v = a.value || null;                                   // ~960 cars have value:null — guard it
    const scoreable = isScoreable(v);
    items.push({
      id: a.id,
      title: a.title || "",                                       // BaT titles already include the year
      url: a.listing_url, img: a.thumbnail_url,
      bid: price, cur: a.bid && a.bid.currency, endMs,
      scoreable,
      noReserve: !!(a.flags && a.flags.no_reserve),
      isDeal: !!(scoreable && v.is_deal),
      dealPct: scoreable ? Math.round(v.deal_pct * 100) : null,
      dealScore: scoreable && v.deal_score != null ? v.deal_score : null,  // condition-adjusted
      fairValue: scoreable ? v.fair_value : null,
      details: a.details || null,
    });
  }
  if (!items.length) { el.hidden = true; return; }               // fail-soft: no ticker, map still works
  // deals first (biggest discount), then everything else soonest-ending first
  const score = (it) => it.dealScore != null ? it.dealScore : (it.dealPct != null ? it.dealPct / 100 : 0);
  items.sort((x, y) => {
    if (x.isDeal !== y.isDeal) return x.isDeal ? -1 : 1;
    if (x.isDeal && y.isDeal) return score(y) - score(x);   // condition-adjusted deal_score
    return x.endMs - y.endMs;
  });
  const totalDeals = items.reduce((n, i) => n + (i.isDeal ? 1 : 0), 0);
  // cap a glanceable marquee — deals sort first, so the cap keeps every deal + the soonest cars
  items = items.slice(0, TICKER_MAX);

  applyDailyFlash(items);                                         // Phase 2: green/red daily diff
  const chips = items.map(chipHTML).join("");
  const label = `<div class="ticker-label">⏱ Ending soon`
    + (totalDeals ? ` · <span class="deals">${totalDeals} deal${totalDeals > 1 ? "s" : ""}</span>` : "")
    + `</div>`;
  const dur = Math.max(90, items.length * 7.2);                  // slower marquee (~3x original; constant regardless of count)
  // chips rendered twice so translateX(-50%) loops seamlessly
  el.innerHTML = label
    + `<div class="ticker-viewport"><div class="ticker-track" style="animation-duration:${dur}s">`
    + chips + chips
    + `</div></div>`;
  el.hidden = false;
  startTickerCountdown();
}

// Phase 2 green/red flash: diff each scoreable car's deal % against what we stored the last
// day the page was opened. Mutates items with a `.delta` (points moved). Fires only across a
// day boundary, only for scoreable cars, and persists today's values for tomorrow. localStorage
// only — no network, no timer.
function applyDailyFlash(items) {
  const KEY = "bat_ticker_prev_v1";
  const d = new Date();
  const today = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
  let prev = null;
  try { prev = JSON.parse(localStorage.getItem(KEY) || "null"); } catch (e) { prev = null; }
  const crossDay = !!(prev && prev.day && prev.day !== today);
  const current = {};
  for (const it of items) {
    if (it.scoreable && it.id != null) current[it.id] = it.dealPct;
  }
  if (crossDay && prev.values) {
    for (const it of items) {
      if (it.scoreable && it.id != null && prev.values[it.id] != null) {
        const delta = it.dealPct - prev.values[it.id];                // points the deal moved
        if (delta !== 0) it.delta = delta;
      }
    }
  }
  if (!prev || prev.day !== today) {
    try { localStorage.setItem(KEY, JSON.stringify({ day: today, values: current })); } catch (e) {}
  }
}

function chipHTML(it) {
  const safeUrl = /^https?:\/\//i.test(it.url || "") ? it.url : "#";   // no javascript: hrefs from scraped data
  const img = it.img
    ? `<img src="${escapeHTML(it.img)}" loading="lazy" referrerpolicy="no-referrer" alt="">` : "";
  let dealHTML;
  if (it.isDeal) {
    dealHTML = `<span class="ticker-tag">DEAL</span>`
      + `<span class="ticker-deal">${it.dealPct}% under</span>`;
  } else if (it.scoreable && it.noReserve && it.dealPct != null) {
    const above = it.dealPct < 0;                 // a real discount only on a no-reserve car
    dealHTML = `<span class="ticker-deal${above ? " above" : ""}">`
      + (above ? (-it.dealPct) + "% over" : it.dealPct + "% under") + `</span>`;
  } else if (it.scoreable) {
    // reserve car: show the comp market as context, never a discount (bid may be below reserve)
    dealHTML = `<span class="ticker-thin">comps ~${fmtMoney(it.fairValue, it.cur)}</span>`;
  } else {
    dealHTML = `<span class="ticker-thin">no comp est.</span>`;  // thin comps, no number
  }
  let deltaHTML = "", flashCls = "";
  if (it.delta != null && it.delta !== 0) {                       // moved since the last day you looked
    const up = it.delta > 0;                                      // deal improved (more under comps)
    deltaHTML = `<span class="ticker-delta ${up ? "up" : "down"}">${up ? "▲" : "▼"}${Math.abs(it.delta)}</span>`;
    flashCls = up ? " flash-up" : " flash-down";
  }
  // mileage + condition: the at-a-glance "is this worth a look" signal
  const milesTxt = fmtMiles(it.details);
  const milesHTML = milesTxt
    ? `<span class="ticker-miles${it.details && it.details.tmu ? " tmu" : ""}">${escapeHTML(milesTxt)}</span>` : "";
  const cs = condSplit(it.details && it.details.condition);
  let condHTML = "";
  if (cs.bad.length) condHTML = `<span class="ticker-flag">🚩${escapeHTML(cs.bad[0])}</span>`;
  else if (cs.good.length) condHTML = `<span class="ticker-good">${escapeHTML(cs.good[0])}</span>`;
  return `<a class="ticker-chip${it.isDeal ? " deal" : ""}${flashCls}" href="${escapeHTML(safeUrl)}" target="_blank" rel="noopener noreferrer">`
    + img
    + `<span class="ticker-name">${escapeHTML(it.title)}</span>`
    + `<span class="ticker-bid">${fmtMoney(it.bid, it.cur)}</span>`
    + milesHTML
    + condHTML
    + dealHTML
    + deltaHTML
    + `<span class="ticker-clock" data-ends="${it.endMs}"></span>`
    + `</a>`;
}

function fmtCountdown(ms) {
  if (ms <= 0) return "ENDED";
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600),
        m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (d > 0) return d + "d " + h + "h";
  if (h > 0) return h + "h " + m + "m";
  if (m > 0) return m + "m " + sec + "s";
  return sec + "s";
}
function tickCountdowns() {
  const now = Date.now();
  document.querySelectorAll("[data-ends]").forEach(el => {        // ticker clocks + card + list rows
    const left = Number(el.getAttribute("data-ends")) - now;
    el.textContent = fmtCountdown(left);
    el.classList.toggle("urgent", left > 0 && left <= 3600 * 1000);   // < 1h to go
    el.classList.toggle("lt-urgent", left > 0 && left <= 3600 * 1000);
  });
}
function startTickerCountdown() {
  if (tickerTimer) { clearInterval(tickerTimer); tickerTimer = null; }
  tickCountdowns();
  if (document.visibilityState === "visible") tickerTimer = setInterval(tickCountdowns, 1000);
}
document.addEventListener("visibilitychange", () => {
  const el = document.getElementById("ticker");
  const hidden = document.visibilityState !== "visible";
  if (el) el.classList.toggle("paused", hidden);                 // pause marquee when tab is hidden
  if (hidden) { if (tickerTimer) { clearInterval(tickerTimer); tickerTimer = null; } }
  else startTickerCountdown();                                    // resume clocks (ticker + card + list)
});

// hover preview: a big detailed photo when you hover a ticker chip. Lives on <body> (fixed)
// so it escapes the ticker strip's overflow:hidden; pointer-events:none so it never flickers.
(function setupTickerPreview() {
  const el = document.getElementById("ticker");
  const pv = document.getElementById("ticker-preview");
  if (!el || !pv) return;
  const img = pv.querySelector("img"), cap = pv.querySelector(".cap");
  const W = 474;                                   // preview width + padding/border
  el.addEventListener("mouseover", (e) => {
    const chip = e.target.closest && e.target.closest(".ticker-chip");
    if (!chip) return;
    const chipImg = chip.querySelector("img");
    const src = chipImg && chipImg.getAttribute("src");
    if (!src) { pv.hidden = true; return; }
    if (img.getAttribute("src") !== src) img.src = src;
    cap.textContent = (chip.querySelector(".ticker-name") || {}).textContent || "";
    const r = chip.getBoundingClientRect();
    pv.style.left = Math.min(Math.max(8, r.left), window.innerWidth - W) + "px";
    pv.style.top = (r.bottom + 8) + "px";
    pv.hidden = false;
  });
  el.addEventListener("mouseleave", () => { pv.hidden = true; });
})();

// --- persistent detail card: a click pins a card (with the deadline + a "View on BaT"
// button) instead of jumping straight to the listing. Reused by the map and the list.
function carToCard(a) {
  return {
    _t: a.title, _y: a.year, _p: a.bid && a.bid.amount, _cur: a.bid && a.bid.currency,
    _c: a.engagement && a.engagement.comments, _w: a.engagement && a.engagement.watchers,
    _img: a.thumbnail_url, _url: a.listing_url, _v: a.value, _d: a.details,
    _nr: !!(a.flags && a.flags.no_reserve), _end: a.ends_at || null,
  };
}
function closeCard() { const c = document.getElementById("card"); if (c) c.hidden = true; }
function openCard(d) {
  const card = document.getElementById("card");
  if (!card || !d) return;
  const safeUrl = /^https?:\/\//i.test(d._url || "") ? d._url : null;
  const img = d._img ? `<img class="card-img" src="${escapeHTML(d._img)}" referrerpolicy="no-referrer" alt="">` : "";
  let clock = "";
  const endMs = d._end ? Date.parse(d._end) : NaN;
  if (endMs) {
    const left = endMs - Date.now();
    clock = left > 0
      ? `<div class="card-row">Ends in <span class="card-clock" data-ends="${endMs}">${fmtCountdown(left)}</span>`
        + ` <span class="card-muted">· ${new Date(endMs).toLocaleString()}</span></div>`
      : `<div class="card-row card-muted">Auction ended</div>`;
  }
  let vline = "";
  const v = d._v;
  if (v && v.fair_value) {
    const below = v.deal_pct != null ? Math.round(v.deal_pct * 100) : null;
    vline = `<div class="card-row">Fair value: <b>${fmtMoney(v.fair_value, d._cur)}</b> `
      + `<span class="card-muted">(${v.n_comps} comps, ${escapeHTML(v.basis || "")})</span></div>`;
    if (d._nr && below != null) {
      vline += `<div class="card-row">Bid is <b>${below >= 0 ? below + "% below" : (-below) + "% above"}</b> comps`
        + (v.is_deal ? ` · <span class="card-deal">DEAL — ending soon</span>` : "") + `</div>`;
    } else if (!d._nr) {
      vline += `<div class="card-row card-muted">Reserve auction — bid may be below reserve, not a discount</div>`;
    }
    if (v.appreciation_pct != null) {
      vline += `<div class="card-row card-muted">Recent trend: ${v.appreciation_pct >= 0 ? "+" : ""}${Math.round(v.appreciation_pct * 100)}%</div>`;
    }
  }
  let dline = "";
  const det = d._d;
  if (det) {
    const miles = fmtMiles(det), cs = condSplit(det.condition), parts = [];
    if (miles) parts.push(escapeHTML(miles));
    if (cs.bad.length) parts.push(`<span class="card-flag">🚩 ${escapeHTML(cs.bad.join(", "))}</span>`);
    if (cs.good.length) parts.push(`<span class="card-good">${escapeHTML(cs.good.join(", "))}</span>`);
    if (parts.length) dline = `<div class="card-row">${parts.join(" · ")}</div>`;
  }
  const btn = safeUrl
    ? `<a class="btn-link" href="${escapeHTML(safeUrl)}" target="_blank" rel="noopener noreferrer">View on BaT →</a>`
    : `<div class="card-row card-muted">No listing link</div>`;
  card.innerHTML =
    `<div class="card-close" role="button" aria-label="Close">✕</div>`
    + img
    + `<div class="card-title">${escapeHTML(d._t || "")}</div>`
    + `<div class="card-row"><span class="card-bid">${fmtMoney(d._p, d._cur)}</span> <span class="card-muted">current bid</span></div>`
    + clock + dline + vline
    + `<div class="card-row card-muted">${d._c ?? "—"} comments · ${d._w ?? "—"} watchers</div>`
    + btn;
  card.querySelector(".card-close").onclick = closeCard;
  card.hidden = false;
  startTickerCountdown();                   // keep the card's countdown ticking even if the ticker is hidden
}
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeCard(); });

function resetZoom() {
  chart.dispatchAction({ type: "dataZoom", batch: [
    { dataZoomIndex: 0, start: 0, end: 100 }, { dataZoomIndex: 1, start: 0, end: 100 }] });
}
chart.on("click", (p) => { if (p.data) openCard(p.data); });
chart.getZr().on("dblclick", resetZoom);   // double-click anywhere to reset the zoom

// --- List view: a sortable table of the filtered cars (zoom-free drill-down).
const LIST_COLS = [
  { key: "name",     label: "Car" },
  { key: "price",    label: "Price",    num: true },
  { key: "ends",     label: "Ends",     num: true },
  { key: "deal",     label: "vs comps", num: true },
  { key: "watchers", label: "Watchers", num: true },
  { key: "comments", label: "Comments", num: true },
];
function listValue(a, key) {
  switch (key) {
    case "price": return (a.bid && a.bid.amount) || 0;
    case "ends": return a.ends_at ? Date.parse(a.ends_at) : Infinity;
    case "deal": return (a.value && a.value.deal_pct != null && a.flags && a.flags.no_reserve) ? a.value.deal_pct : -Infinity;
    case "watchers": return (a.engagement && a.engagement.watchers != null) ? a.engagement.watchers : -1;
    case "comments": return (a.engagement && a.engagement.comments != null) ? a.engagement.comments : -1;
    case "name": return (a.title || "").toLowerCase();
    default: return 0;
  }
}
function renderList() {
  const lp = document.getElementById("listpanel");
  if (!lp) return;
  const rows = FILTERED.slice().sort((x, y) => {
    const a = listValue(x, listSort.key), b = listValue(y, listSort.key);
    const c = a < b ? -1 : a > b ? 1 : 0;
    return listSort.dir === "asc" ? c : -c;
  });
  const head = LIST_COLS.map(col => {
    const sorted = col.key === listSort.key ? " sorted" + (listSort.dir === "asc" ? " asc" : "") : "";
    return `<th class="${col.num ? "num" : ""}${sorted}" data-key="${col.key}">${col.label}</th>`;
  }).join("");
  const body = rows.slice(0, 400).map((a, i) => {
    const endMs = a.ends_at ? Date.parse(a.ends_at) : NaN;
    const clock = endMs ? `<span data-ends="${endMs}">${fmtCountdown(endMs - Date.now())}</span>` : "—";
    const v = a.value, nr = !!(a.flags && a.flags.no_reserve);
    let deal = "—";
    if (v && v.deal_pct != null && nr) {
      const pct = Math.round(v.deal_pct * 100);
      deal = pct >= 0 ? `<span class="lt-deal">${pct}% under</span>` : `<span class="lt-over">${-pct}% over</span>`;
    } else if (v && v.fair_value) {
      deal = `<span class="lt-over">comps ~${fmtMoney(v.fair_value, a.bid && a.bid.currency)}</span>`;
    }
    const miles = fmtMiles(a.details);
    const img = a.thumbnail_url
      ? `<img class="lt-img" src="${escapeHTML(a.thumbnail_url)}" loading="lazy" referrerpolicy="no-referrer" alt="">` : "";
    return `<tr data-i="${i}">`
      + `<td><div style="display:flex;align-items:center;gap:8px">${img}<span class="lt-name">${escapeHTML(a.title || "")}`
        + `${miles ? ` <span class="card-muted">· ${escapeHTML(miles)}</span>` : ""}</span></div></td>`
      + `<td class="num">${fmtMoney(a.bid && a.bid.amount, a.bid && a.bid.currency)}</td>`
      + `<td class="num">${clock}</td>`
      + `<td class="num">${deal}</td>`
      + `<td class="num">${(a.engagement && a.engagement.watchers) ?? "—"}</td>`
      + `<td class="num">${(a.engagement && a.engagement.comments) ?? "—"}</td>`
      + `</tr>`;
  }).join("");
  lp.innerHTML =
    `<div class="card-muted" style="padding:8px 0">${rows.length} cars`
      + `${rows.length > 400 ? " (showing first 400)" : ""} · click a row for details</div>`
    + `<table class="listtbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  lp.querySelectorAll("th").forEach(th => th.onclick = () => {
    const key = th.getAttribute("data-key");
    if (listSort.key === key) listSort.dir = listSort.dir === "asc" ? "desc" : "asc";
    else { listSort.key = key; listSort.dir = (key === "ends" || key === "name") ? "asc" : "desc"; }
    renderList();
  });
  lp.querySelectorAll("tbody tr").forEach(tr => tr.onclick = () =>
    openCard(carToCard(rows[Number(tr.getAttribute("data-i"))])));
  startTickerCountdown();
}
function setView(v) {
  listView = (v === "list");
  document.getElementById("chart").hidden = listView;
  document.getElementById("listpanel").hidden = !listView;
  document.getElementById("view-map").classList.toggle("active", !listView);
  document.getElementById("view-list").classList.toggle("active", listView);
  if (listView) renderList();
  else chart.resize();                      // chart was display:none; re-measure on return
}
document.getElementById("view-map").onclick = () => setView("map");
document.getElementById("view-list").onclick = () => setView("list");

document.getElementById("ymetric").addEventListener("change", render);
document.getElementById("xmetric").addEventListener("change", render);
document.getElementById("markers").addEventListener("change", render);

// --- filter controller (pivot): one spec, read from the bar, written by chips/presets/saved views
const SAVED_KEY = "bat_saved_views_v1";
let activePreset = null;   // a category id for a one-tap preset, or null

function debounce(fn, ms) { let t; return function () { clearTimeout(t); t = setTimeout(fn, ms); }; }

function currentSpec() {
  const v = id => (document.getElementById(id).value || "").trim();
  const n = id => { const x = v(id); return x ? Number(x) : null; };
  const spec = {};
  const mk = v("f-make");
  if (mk) spec.makes = mk.toLowerCase().split(/[,\s]+/).filter(Boolean);
  const ymin = n("f-yearmin"); if (ymin) spec.yearMin = ymin;
  const ymax = n("f-yearmax"); if (ymax) spec.yearMax = ymax;
  const pmax = n("f-pricemax"); if (pmax) spec.priceMax = pmax;
  const mmax = n("f-milesmax"); if (mmax) spec.milesMax = mmax;
  if (document.getElementById("f-noreserve").checked) spec.noReserve = true;
  if (document.getElementById("f-deals").checked) spec.dealsOnly = true;
  if (activePreset) spec.category = activePreset;
  return spec;
}

function applySpec(spec) {
  spec = spec || {};
  document.getElementById("f-make").value = (spec.makes || []).join(" ");
  document.getElementById("f-yearmin").value = spec.yearMin || "";
  document.getElementById("f-yearmax").value = spec.yearMax || "";
  document.getElementById("f-pricemax").value = spec.priceMax || "";
  document.getElementById("f-milesmax").value = spec.milesMax || "";
  document.getElementById("f-noreserve").checked = !!spec.noReserve;
  document.getElementById("f-deals").checked = !!spec.dealsOnly;
  activePreset = spec.category || null;
}

function updateFilterReadout(cars, all, spec) {
  const el = document.getElementById("f-count");
  if (!el) return;
  let msg = `${cars.length} of ${all.length} cars`;
  if (spec && spec.milesMax != null && window.BATFilters) {        // 1C-A honesty: say where the data is
    msg += ` · mileage known for ${BATFilters.knownCount(cars, "miles")}`;
  }
  el.textContent = msg;
}

function loadSaved() { try { return JSON.parse(localStorage.getItem(SAVED_KEY) || "[]"); } catch (e) { return []; } }
function storeSaved(list) { try { localStorage.setItem(SAVED_KEY, JSON.stringify(list.slice(0, 20))); } catch (e) {} }

function renderChips() {
  const wrap = document.getElementById("chips");
  if (!wrap) return;
  wrap.innerHTML = "";
  const presets = [["", "All"]].concat(Object.keys(CATEGORY_LABELS).map(id => [id, CATEGORY_LABELS[id]]));
  for (const [id, label] of presets) {
    const c = document.createElement("span");
    c.className = "chip preset" + ((activePreset || "") === id ? " active" : "");
    c.textContent = label;
    c.onclick = () => { activePreset = id || null; renderChips(); render(); };
    wrap.appendChild(c);
  }
  for (const view of loadSaved()) {
    const c = document.createElement("span");
    c.className = "chip"; c.textContent = view.name;
    c.onclick = () => { applySpec(view.spec); renderChips(); render(); };
    const x = document.createElement("span");
    x.className = "x"; x.textContent = "✕";
    x.onclick = (e) => { e.stopPropagation(); storeSaved(loadSaved().filter(v => v.name !== view.name)); renderChips(); };
    c.appendChild(x);
    wrap.appendChild(c);
  }
}

function setupFilters(cars) {
  const counts = {};
  for (const a of cars) { const m = a.make && a.make.slug; if (m) counts[m] = (counts[m] || 0) + 1; }
  const dl = document.getElementById("makes");
  Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 60).forEach(m => {
    const o = document.createElement("option"); o.value = m; dl.appendChild(o);
  });
  ["f-make", "f-yearmin", "f-yearmax", "f-pricemax", "f-milesmax"].forEach(
    id => document.getElementById(id).addEventListener("input", debounce(render, 200)));
  ["f-noreserve", "f-deals"].forEach(id => document.getElementById(id).addEventListener("change", render));
  document.getElementById("f-clear").onclick = () => { applySpec({}); renderChips(); render(); };
  document.getElementById("f-save").onclick = () => {
    const name = (prompt("Name this view (e.g. \"Dad: cheap trucks\"):") || "").trim();
    if (!name) return;
    const list = loadSaved().filter(v => v.name !== name);
    list.unshift({ name, spec: currentSpec() });
    storeSaved(list); renderChips();
  };
  renderChips();
}

(async function init() {
  SNAPSHOT = await loadData();
  if (!SNAPSHOT) {
    chart.dispose();
    statusEl.innerHTML =
      "Couldn't load <code>data/auctions.json</code>.<br><br>"
      + "Run the scraper, then serve over http (file:// is blocked by the browser):<br>"
      + "<code>python -m scraper</code><br>"
      + "<code>python3 -m http.server</code> &nbsp;then open <code>http://localhost:8000/web/</code>";
    metaEl.textContent = "no data";
    return;
  }
  const all = SNAPSHOT.auctions;
  const scored = all.filter(a => a.value && a.value.fair_value != null).length;
  const enriched = all.filter(a => a.engagement && a.engagement.comments != null).length;
  metaEl.innerHTML = `${all.length} live cars · ${scored} priced vs comps · ${enriched} enriched `
    + `· scraped ${SNAPSHOT.scraped_at ? new Date(SNAPSHOT.scraped_at).toLocaleString() : "?"}`;
  if (!all.length) {
    statusEl.innerHTML = "Snapshot loaded but no cars to plot.";
    return;
  }
  setupFilters(all);
  render();
  buildTicker(SNAPSHOT);
})();
</script>
