<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Natural-language search interpreter endpoint (server-side LLM). Empty = basic keyword
     search only. This is a PUBLIC URL, never a secret; no API key lives in the frontend. -->
<meta name="bat-search-endpoint" content="" />
<title>BaT Value Map</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1115; color: #e7e9ee;
  }
  header { padding: 14px 18px 6px; }
  h1 { font-size: 18px; font-weight: 600; margin: 0; }
  .sub { font-size: 12px; color: #9aa0ad; margin-top: 3px; }
  .controls { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; padding: 8px 18px 4px; font-size: 13px; }
  .controls label { color: #9aa0ad; }
  select { background: #1a1d24; color: #e7e9ee; border: 1px solid #2a2e38; border-radius: 6px; padding: 5px 8px; font-size: 13px; }
  #chart { width: 100%; height: 78vh; min-height: 480px; }
  #status { padding: 24px 18px; color: #9aa0ad; font-size: 14px; line-height: 1.6; }
  code { background: #1a1d24; padding: 1px 6px; border-radius: 4px; }
  .hint { padding: 2px 18px 10px; font-size: 12px; color: #7b8190; }
  /* --- filter bar + saved-view / preset chips (pivot) --- */
  .filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 4px 18px; font-size: 13px; }
  .filters input[type=number] { width: 92px; }
  .filters input, .filters button { background: #1a1d24; color: #e7e9ee; border: 1px solid #2a2e38;
                                     border-radius: 6px; padding: 5px 8px; font-size: 13px; }
  .filters input::placeholder { color: #6b7280; }
  .filters label { color: #9aa0ad; display: inline-flex; align-items: center; gap: 4px; }
  .filters button { cursor: pointer; }
  .filters button:hover { background: #22262f; }
  #f-count { padding: 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 18px 8px; }
  .chip { cursor: pointer; font-size: 12px; padding: 3px 10px; border-radius: 999px;
          background: #1a1d24; color: #c7ccd6; border: 1px solid #2a2e38; }
  .chip:hover { background: #22262f; }
  .chip.active { background: #5b8def; color: #0f1115; border-color: #5b8def; font-weight: 600; }
  .chip .x { color: #7b8190; margin-left: 6px; }
  .chip.preset { border-style: dashed; }
  /* --- ending-soon ticker (Phase 1) --- */
  #ticker { position: relative; overflow: hidden; white-space: nowrap; display: flex;
            align-items: stretch; height: 46px; background: #12141a;
            border-top: 1px solid #1c1f27; border-bottom: 1px solid #1c1f27; }
  #ticker[hidden] { display: none; }
  .ticker-label { flex: 0 0 auto; z-index: 2; display: flex; align-items: center; gap: 6px;
                  padding: 0 14px; font-size: 12px; font-weight: 600; color: #c7ccd6;
                  background: #12141a; border-right: 1px solid #1c1f27; }
  .ticker-label .deals { color: #ffd54a; }
  .ticker-viewport { overflow: hidden; flex: 1 1 auto; display: flex; align-items: center; }
  .ticker-track { display: inline-flex; align-items: center;
                  animation: ticker-marquee linear infinite; will-change: transform; }
  #ticker:hover .ticker-track, #ticker.paused .ticker-track { animation-play-state: paused; }
  @keyframes ticker-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .ticker-chip { display: inline-flex; align-items: center; gap: 8px; flex: 0 0 auto;
                 padding: 4px 14px; border-right: 1px solid #1c1f27;
                 text-decoration: none; color: #e7e9ee; font-size: 12px; line-height: 1.2; }
  .ticker-chip:hover { background: #1a1d24; }
  .ticker-chip.deal { background: rgba(255,213,74,0.09); }
  .ticker-chip img { width: 40px; height: 28px; object-fit: cover; border-radius: 4px;
                     background: #1a1d24; flex: 0 0 auto; }
  .ticker-name { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .ticker-bid { color: #c7ccd6; }
  .ticker-deal { color: #ffd54a; font-weight: 600; }
  .ticker-deal.above { color: #9aa0ad; font-weight: 400; }
  .ticker-thin { color: #6b7280; }
  .ticker-miles { color: #c7ccd6; background: #1f232c; border-radius: 3px; padding: 1px 5px; font-size: 11px; }
  .ticker-miles.tmu { color: #e0a13a; }
  .ticker-flag { color: #ffb3a7; background: rgba(226,85,59,0.18); border-radius: 3px;
                 padding: 1px 5px; font-size: 10px; font-weight: 700; letter-spacing: .2px; }
  .ticker-good { color: #28b487; font-size: 10px; font-weight: 600; }
  /* hover preview: big detailed photo when you hover a ticker chip */
  #ticker-preview { position: fixed; z-index: 50; pointer-events: none;
                    background: #16181f; border: 1px solid #2a2e38; border-radius: 10px;
                    padding: 6px; box-shadow: 0 12px 32px rgba(0,0,0,.55); }
  #ticker-preview[hidden] { display: none; }
  #ticker-preview img { width: 460px; height: 307px; object-fit: cover; border-radius: 6px; display: block; background: #1a1d24; }
  #ticker-preview .cap { font-size: 13px; color: #e7e9ee; margin-top: 6px; max-width: 460px; }
  .ticker-clock { color: #9aa0ad; font-variant-numeric: tabular-nums; min-width: 52px; }
  .ticker-clock.urgent { color: #e2553b; font-weight: 600; }
  .ticker-tag { background: #ffd54a; color: #0f1115; font-weight: 700; font-size: 10px;
                padding: 1px 5px; border-radius: 3px; }
  .ticker-delta { font-size: 10px; font-weight: 700; margin-left: 1px; }
  .ticker-delta.up { color: #28b487; }
  .ticker-delta.down { color: #e2553b; }
  @keyframes chip-flash-up   { from { background: rgba(40,180,135,0.45); } to { background: transparent; } }
  @keyframes chip-flash-down { from { background: rgba(226,85,59,0.45);  } to { background: transparent; } }
  .ticker-chip.flash-up   { animation: chip-flash-up   1.8s ease-out 1; }
  .ticker-chip.flash-down { animation: chip-flash-down 1.8s ease-out 1; }
  @media (prefers-reduced-motion: reduce) {
    .ticker-track { animation: none; }
    .ticker-viewport { overflow-x: auto; }
    .ticker-chip.flash-up, .ticker-chip.flash-down { animation: none; }
  }
  /* --- Map / List view toggle --- */
  .seg { display: inline-flex; border: 1px solid #2a2e38; border-radius: 6px; overflow: hidden; }
  .seg button { background: #1a1d24; color: #c7ccd6; border: 0; padding: 5px 12px; font-size: 13px; cursor: pointer; }
  .seg button.active { background: #5b8def; color: #0f1115; font-weight: 600; }
  /* --- clickable car detail card (stays until dismissed) --- */
  #card { position: fixed; top: 64px; right: 16px; z-index: 60; width: 340px; max-width: calc(100vw - 32px);
          background: #16181f; border: 1px solid #2a2e38; border-radius: 12px; padding: 12px;
          box-shadow: 0 16px 40px rgba(0,0,0,.55); font-size: 13px; }
  #card[hidden] { display: none; }
  #card .card-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; background: #1a1d24; display: block; }
  #card .card-close { position: absolute; top: 8px; right: 10px; cursor: pointer; color: #fff;
                      background: rgba(0,0,0,.55); border-radius: 50%; width: 26px; height: 26px;
                      display: flex; align-items: center; justify-content: center; font-size: 14px; line-height: 1; }
  #card .card-title { font-weight: 600; font-size: 15px; margin: 10px 0 6px; }
  #card .card-row { color: #c7ccd6; margin: 4px 0; }
  #card .card-bid { font-size: 18px; font-weight: 700; color: #e7e9ee; }
  #card .card-clock { font-variant-numeric: tabular-nums; font-weight: 600; }
  #card .card-clock.urgent { color: #e2553b; }
  #card .card-deal { color: #ffd54a; font-weight: 600; }
  #card .card-flag { color: #ffb3a7; }
  #card .card-good { color: #28b487; }
  .card-muted { color: #9aa0ad; }
  .btn-link { display: block; text-align: center; margin-top: 10px; padding: 9px; border-radius: 8px;
              background: #5b8def; color: #0f1115; font-weight: 600; text-decoration: none; }
  .btn-link:hover { background: #6f9bf0; }
  /* --- sortable list view --- */
  #listpanel { padding: 4px 18px 28px; }
  #listpanel[hidden] { display: none; }
  table.listtbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.listtbl th { text-align: left; color: #9aa0ad; font-weight: 600; padding: 8px 10px;
                     border-bottom: 1px solid #2a2e38; cursor: pointer; white-space: nowrap;
                     position: sticky; top: 0; background: #0f1115; }
  table.listtbl th.num { text-align: right; }
  table.listtbl th:hover { color: #e7e9ee; }
  table.listtbl th.sorted { color: #e7e9ee; }
  table.listtbl th.sorted::after { content: " ▾"; color: #5b8def; }
  table.listtbl th.sorted.asc::after { content: " ▴"; }
  table.listtbl td { padding: 7px 10px; border-bottom: 1px solid #181b22; vertical-align: middle; }
  table.listtbl td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.listtbl tbody tr { cursor: pointer; }
  table.listtbl tbody tr:hover { background: #1a1d24; }
  .lt-img { width: 56px; height: 40px; object-fit: cover; border-radius: 4px; background: #1a1d24; flex: 0 0 auto; }
  .lt-name { font-weight: 500; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lt-deal { color: #ffd54a; font-weight: 600; }
  .lt-over { color: #9aa0ad; }
  .lt-urgent { color: #e2553b; font-weight: 600; }
  /* --- primary search --- */
  .search { display: flex; gap: 8px; padding: 10px 18px 4px; }
  .search input { flex: 1 1 auto; min-width: 0; background: #1a1d24; color: #e7e9ee;
                  border: 1px solid #2a2e38; border-radius: 8px; padding: 9px 12px; font-size: 15px; }
  .search input::placeholder { color: #6b7280; }
  .search button { background: #5b8def; color: #0f1115; border: 0; border-radius: 8px;
                   padding: 9px 14px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .search button#q-clear { background: #1a1d24; color: #c7ccd6; border: 1px solid #2a2e38; font-weight: 500; }
  .search-summary { padding: 2px 18px 0; font-size: 12px; color: #9aa0ad; }
  .search-summary:empty { display: none; }
  .search-summary.err { color: #e2553b; }
  details.advanced { padding: 2px 18px; }
  details.advanced > summary { cursor: pointer; color: #9aa0ad; font-size: 13px; padding: 4px 0; list-style: none; }
  details.advanced > summary::-webkit-details-marker { display: none; }
  details.advanced > summary::before { content: "▸ "; }
  details.advanced[open] > summary::before { content: "▾ "; }
  details.advanced .filters { padding: 6px 0 8px; }
  .maphint { padding: 2px 18px 8px; }
  #q-chips .chip .x { cursor: pointer; }
  /* color key (shown only while a search is active) */
  #colorlegend { display: none; flex-wrap: wrap; gap: 3px 14px; padding: 2px 18px 6px; font-size: 11px; color: #9aa0ad; }
  #colorlegend.on { display: flex; }
  #colorlegend .sw { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  #colorlegend .dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; border: 1px solid #0f1115; }
  #colorlegend .dot.ring { box-shadow: 0 0 0 2px #ffd54a; }
  #colorlegend .dot.hollow { background: transparent !important; }
  #colorlegend .glyph { font-size: 12px; line-height: 1; flex: 0 0 auto; width: 11px; text-align: center; }
  /* --- mobile (~390px) --- */
  html, body { max-width: 100%; overflow-x: hidden; }
  @media (max-width: 480px) {
    header { padding: 10px 12px 4px; }
    .search, .search-summary, .controls, details.advanced, .chips, #q-chips, .maphint { padding-left: 12px; padding-right: 12px; }
    .controls { gap: 10px; }
    #chart { height: 64vh; min-height: 360px; }
    /* ticker: real horizontal scroll instead of a clipped marquee */
    #ticker .ticker-track { animation: none; }
    #ticker .ticker-viewport { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .maphint { display: none; }
    #card { top: auto; bottom: 8px; right: 8px; left: 8px; width: auto; }
  }
</style>
</head>
<body>
<header>
  <h1>BaT Value Map</h1>
  <div class="sub" id="meta">loading…</div>
</header>
<form class="search" id="searchform" autocomplete="off">
  <input id="q" type="search" placeholder="Search titles, makes, and models" aria-label="Search cars">
  <button id="q-go" type="submit">Find cars</button>
  <button id="q-clear" type="button">Clear</button>
</form>
<div id="q-summary" class="search-summary"></div>
<div class="chips" id="q-chips"></div>
<div id="colorlegend"></div>
<div class="controls">
  <span><label for="ymetric">Map:</label>
    <select id="ymetric">
      <option value="comments" selected>Comments</option>
      <option value="closing">Closing soon</option>
      <option value="watchers">Watchers</option>
      <option value="deal">Comp discount</option>
    </select>
  </span>
  <span><label>View:</label>
    <span class="seg">
      <button id="view-map" class="active" type="button">Map</button>
      <button id="view-list" type="button">List</button>
    </span></span>
  <span id="f-count" class="hint"></span>
</div>
<details class="advanced" id="advanced">
  <summary>Advanced filters &amp; display</summary>
  <div class="filters">
    <input id="f-make" placeholder="make(s), e.g. porsche toyota" list="makes" autocomplete="off">
    <datalist id="makes"></datalist>
    <input id="f-yearmin" type="number" inputmode="numeric" placeholder="year ≥">
    <input id="f-yearmax" type="number" inputmode="numeric" placeholder="year ≤">
    <input id="f-pricemax" type="number" inputmode="numeric" placeholder="max bid">
    <input id="f-milesmax" type="number" inputmode="numeric" placeholder="max mi">
    <label><input type="checkbox" id="f-noreserve"> No reserve</label>
    <label><input type="checkbox" id="f-deals"> Deals only</label>
    <span><label for="markers">Markers:</label>
      <select id="markers">
        <option value="auto">Auto</option>
        <option value="dots">Dots</option>
        <option value="photos">Photos</option>
      </select></span>
    <button id="f-clear" type="button">Clear filters</button>
    <button id="f-save" type="button">★ Save view</button>
  </div>
</details>
<div class="chips" id="chips"></div>
<div class="hint maphint">Scroll or pinch to zoom · box-zoom &amp; reset top-right · double-click to reset · click a car for details</div>
<div id="ticker" hidden></div>
<div id="chart"></div>
<div id="listpanel" hidden></div>
<div id="status"></div>
<div id="ticker-preview" hidden><img alt="" referrerpolicy="no-referrer"><div class="cap"></div></div>
<div id="card" hidden></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<!-- ?v= cache-buster: BUMP this token whenever filters.js / map-data.js / search.js change, so a
     returning browser never pairs a freshly-deployed index.html with a STALE cached script (which
     would call functions the old script lacks → render() throws → blank chart). -->
<script src="./filters.js?v=20260622b"></script>
<script src="./map-data.js?v=20260622b"></script>
<script src="./search.js?v=20260622b"></script>
<script>
const DATA_PATHS = ["../data/auctions.json", "./auctions.json"];
// The five categories are placeholder metadata only — they no longer color the map,
// drive a legend, or appear as preset chips. category_ids still ride along in the snapshot
// and BATFilters still understands `category` so old saved views keep working.

const statusEl = document.getElementById("status");
const metaEl = document.getElementById("meta");
const chart = echarts.init(document.getElementById("chart"), "dark");
window.addEventListener("resize", () => chart.resize());
// Re-render when we cross the mobile/desktop boundary so the declutter + coloring re-evaluate
// for the new platform (IS_MOBILE is read inside render/buildSeries). Guarded against pre-init.
const MOBILE_MQ = window.matchMedia("(max-width: 480px), (pointer: coarse)");
(MOBILE_MQ.addEventListener || MOBILE_MQ.addListener).call(MOBILE_MQ,
  "change", () => { if (SNAPSHOT) render(); });

// --- Cursor-anchored zoom (wheel + trackpad scroll + pinch). ECharts' built-in wheel zoom
// has a fixed, aggressive step that feels "way too fast" on a trackpad, where a two-finger
// scroll fires a BURST of momentum events that compound. So native wheel zoom is OFF (see the
// dataZoom config) and we drive every zoom gesture ourselves: normalize the delta across devices
// (mouse lines/px, trackpad px, pinch), take a SMALL bite per event, and clamp it so no single
// event (or a momentum spike) jumps the view. Zoom is in DATA space via startValue/endValue, so
// the point under the cursor stays put on both the log and linear axes. Drag-to-pan
// (moveOnMouseMove) is left to ECharts; box-zoom + double-click reset are backstops.
(function setupCursorZoom() {
  const dom = chart.getDom();
  const full = {};                 // full data extent per axis, cached while fully zoomed out

  function axisDZ() {
    const dz = chart.getOption().dataZoom || [];
    let xi = -1, yi = -1;
    dz.forEach((d, i) => {
      if (xi < 0 && d.xAxisIndex != null && (!Array.isArray(d.xAxisIndex) || d.xAxisIndex.length)) xi = i;
      if (yi < 0 && d.yAxisIndex != null && (!Array.isArray(d.yAxisIndex) || d.yAxisIndex.length)) yi = i;
    });
    return { dz, xi, yi };
  }

  function zoomAxis(axisType, dzIdx, px, py, factor, dz) {
    const am = chart.getModel().getComponent(axisType, 0);
    if (!am) return;
    const isLog = am.get("type") === "log";
    const ext = am.axis.scale.getExtent();
    const vmin = ext[0], vmax = ext[1];
    const d = chart.convertFromPixel({ gridIndex: 0 }, [px, py]);
    const vc = axisType === "xAxis" ? d[0] : d[1];
    if (!isFinite(vc)) return;
    const z = dz[dzIdx];             // cache the full extent so zoom-out can't exceed the data
    if ((z.start == null || z.start <= 0.1) && (z.end == null || z.end >= 99.9)) full[axisType] = [vmin, vmax];
    const cap = full[axisType];
    let nmin, nmax;
    if (isLog) {
      const L = Math.log, E = Math.exp, lc = L(vc), lo = L(vmin), hi = L(vmax);
      nmin = E(lc - (lc - lo) * factor); nmax = E(lc + (hi - lc) * factor);
    } else {
      nmin = vc - (vc - vmin) * factor; nmax = vc + (vmax - vc) * factor;
    }
    if (cap) { nmin = Math.max(nmin, cap[0]); nmax = Math.min(nmax, cap[1]); }
    if (nmax > nmin) chart.dispatchAction({ type: "dataZoom", dataZoomIndex: dzIdx, startValue: nmin, endValue: nmax });
  }

  // Per-event zoom step. Lower = slower/smoother. Plain wheel/trackpad scroll is gentle; a Mac
  // pinch (ctrl+wheel) sends much smaller deltas so it gets a larger coefficient to stay responsive.
  // The clamp caps any one event to ~12% so a fast flick or momentum spike can't jump the view.
  const WHEEL_COEF = 0.0018, PINCH_COEF = 0.0075, STEP_MIN = 0.89, STEP_MAX = 1.12;
  dom.addEventListener("wheel", (e) => {
    const gc = chart.getModel().getComponent("grid", 0);
    const cs = gc && gc.coordinateSystem;
    if (!cs) return;
    const r = cs.getRect(), b = dom.getBoundingClientRect();
    const px = e.clientX - b.left, py = e.clientY - b.top;
    if (px < r.x || px > r.x + r.width || py < r.y || py > r.y + r.height) return;  // over margins: let the page scroll
    e.preventDefault();             // over the plot we own the gesture (no page scroll / pinch page-zoom)
    let dy = e.deltaY;
    if (e.deltaMode === 1) dy *= 16;        // lines -> ~px, so wheel speed is consistent across mice
    else if (e.deltaMode === 2) dy *= 100;  // pages -> ~px
    let f = Math.exp(dy * (e.ctrlKey ? PINCH_COEF : WHEEL_COEF));   // dy<0 (scroll up / pinch out) -> f<1 -> zoom in
    f = Math.min(STEP_MAX, Math.max(STEP_MIN, f));                  // small, jump-proof bite per event
    const { dz, xi, yi } = axisDZ();
    if (xi >= 0) zoomAxis("xAxis", xi, px, py, f, dz);
    if (yi >= 0) zoomAxis("yAxis", yi, px, py, f, dz);
  }, { passive: false });
})();

let SNAPSHOT = null;
let FILTERED = [];                       // cars passing the current filter (drives map + list)
let listView = false;                    // Map vs List view
let listSort = { key: "ends", dir: "asc" };   // List default: ending soonest first

async function loadData() {
  for (const p of DATA_PATHS) {
    try {
      const r = await fetch(p, { cache: "no-store" });
      if (r.ok) return await r.json();
    } catch (e) { /* try next */ }
  }
  return null;
}

const CURRENCY_SYMBOLS = { USD: "$", EUR: "€", GBP: "£" };
function fmtMoney(n, currency) {
  if (n == null) return "—";
  const num = Number(n).toLocaleString();
  const sym = CURRENCY_SYMBOLS[currency || "USD"];
  return sym ? sym + num : (currency ? escapeHTML(currency) + " " : "$") + num;
}
function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g,
    c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
// A car is "scoreable" only with enough same make+model comps; thin-comp cars never
// show a deal % or green coloring (the honesty gate from the design doc).
const SCOREABLE_BASES = { "make-model-y3": 1, "make-model-y7": 1 };
function isScoreable(v) {
  return !!(v && v.fair_value && SCOREABLE_BASES[v.basis] && v.deal_pct != null);
}

// Phase 4: mileage + condition badges (the "kill the wasted scroll" signal).
const COND_LABELS = {
  restomod: "RESTOMOD", replica: "REPLICA", tribute: "TRIBUTE", "kit-car": "KIT CAR",
  modified: "MODIFIED", "engine-swap": "ENGINE SWAP", project: "PROJECT",
  "salvage-title": "SALVAGE", "rebuilt-engine": "REBUILT ENGINE", repaint: "REPAINT",
  "numbers-matching": "#s-MATCHING", "original-paint": "ORIG PAINT",
};
const COND_GOOD = { "numbers-matching": 1, "original-paint": 1 };
function condSplit(condition) {
  const bad = [], good = [];
  for (const f of condition || []) (COND_GOOD[f] ? good : bad).push(COND_LABELS[f] || f.toUpperCase());
  return { bad, good };
}
function fmtMiles(d) {
  if (!d || d.miles == null) return (d && d.tmu) ? "TMU" : null;
  const s = d.miles >= 10000 ? Math.round(d.miles / 1000) + "k mi" : d.miles.toLocaleString() + " mi";
  return d.tmu ? s + " · TMU" : s;
}

const IS_MOBILE = () => MOBILE_MQ.matches;   // same media query as the re-render listener above
const FRIENDLY_BASIS = { "make-model-y3": "same model, ±3 years", "make-model-y7": "same model, ±7 years" };
function friendlyBasis(b) { return FRIENDLY_BASIS[b] || b || ""; }
function metricAxisName(metric) {
  if (metric === "closing") return "Time remaining, soonest first";
  if (metric === "deal") return "% under comps →";
  return (metric === "watchers" ? "Watchers" : "Comments") + " (heat, log) →";
}

// One scatter series, one point per active auction with the selected metric. Without a search
// the board keeps its neutral data-state styling (filled/hollow/stale/deal-ring). WITH a search,
// the cars you asked for are tinted by deal quality, look-alikes (same make) are muted, and the
// rest are dimmed (or hidden on mobile). Zero/no bids land in the no-bid lane on the log X axis.
const TIER_COLOR = { under: "#28b487", fair: "#e0a13a", over: "#e2553b", unknown: "#5b8def" };
// redundant non-color channel for red-green colorblindness: shape carries buy/avoid too
const TIER_SYMBOL = { under: "triangle", fair: "circle", over: "diamond", unknown: "circle" };
const TIER_GLYPH = { under: "▲", fair: "●", over: "◆", unknown: "○" };
const CLASS_RANK = { neutral: 0, other: 0, similar: 1, match: 2 };   // higher = drawn later = on top

// Engagement counts (comments/watchers) are heavily right-skewed — a linear axis crushes the
// dense low end (median 17 comments squashed under a lone 90+). Those two metrics plot on a LOG
// y-axis, which spreads the 2–90 bulk and naturally compresses any outlier without a hard cap.
// closing-time and deal-% stay linear (deal can be negative, which a log axis can't render).
// A real 0 can't sit on a log axis, so it drops to this floor lane (mirrors the no-bid X lane);
// the tooltip still shows the true count, so nothing is faked or hidden.
const Y_LOG_FLOOR = 0.6;
function yIsLog(metric) { return metric === "comments" || metric === "watchers"; }

// Every chart data item carries the auction payload the tooltip + click-card read back
// (params.data). Shared by both series builders so click/card/tooltip work identically.
function tagItem(item, a, pt, fresh) {
  item._t = a.title; item._p = (a.bid && a.bid.amount); item._cur = a.bid && a.bid.currency;
  item._c = (a.engagement && a.engagement.comments); item._w = (a.engagement && a.engagement.watchers);
  item._img = a.thumbnail_url; item._url = a.listing_url; item._v = a.value; item._d = a.details;
  item._nr = !!(a.flags && a.flags.no_reserve); item._end = a.ends_at || null;
  item._noBid = pt.noBid; item._fresh = fresh;
  return item;
}

// A no-bid car (zero/absent bid) has no meaningful position on a PRICE axis, so it is left OFF the
// scatter entirely rather than parked at a fake near-$0 placeholder — which used to force ~4 empty
// log decades (0.1→1→10→100→1000) just to show a few dots. No-bid cars stay reachable in the List
// view and the ticker. The axis then starts just below the lowest REAL bid, giving the price range
// the full width.
// Winsorize the price axis to a fixed $1k–$1M band: a sub-$1k bid pins UP to $1k, an over-$1M bid
// pins DOWN to $1M (plotted position only — the tooltip/card keep the true bid). This frames every
// view on the same intuitive range and keeps low/high outliers as edge clusters instead of letting a
// lone $1 (or $3M) bid stretch the log axis or be hidden.
const WINSOR_FLOOR = 1000, WINSOR_CEIL = 1000000;
function priceScatterPoints(pts) { return pts.filter(p => !p.noBid); }
function winsorX(x) { return BATMapData.clampNum(x, WINSOR_FLOOR, WINSOR_CEIL); }
function priceAxisMin(plotPts) {
  if (!plotPts.length) return WINSOR_FLOOR;    // empty/over-filtered view: start at the floor
  let lo = Infinity;
  for (const p of plotPts) { const wx = winsorX(p.x); if (wx < lo) lo = wx; }
  return lo / 1.1;                             // a hair below the lowest plotted (winsorized) bid
}

function buildSeries(cars, metric, markers, now, opts) {
  opts = opts || {};
  const search = !!opts.searchActive;
  const matchedIds = opts.matchedIds, similarMakes = opts.similarMakes;
  const pts = priceScatterPoints(BATMapData.buildPoints(cars, metric, now));   // no-bid cars sit out
  const mode = markers === "auto" ? BATMapData.chooseMarkerMode(pts.length, IS_MOBILE()) : markers;
  const usePhotos = mode === "photos";
  const scrapedAt = SNAPSHOT && SNAPSHOT.scraped_at;
  const RING = "#ffd54a";
  const yLog = yIsLog(metric);
  const data = pts.map(pt => {
    const a = pt.car;
    // Winsorize the plotted X into the $1k–$1M band and floor a real 0 on the log Y; the tooltip
    // reads the TRUE bid/count off the car, so both are shown honestly, not as the placeholder.
    const sp = { x: winsorX(pt.x), y: yLog ? Math.max(pt.y, Y_LOG_FLOOR) : pt.y, car: a };
    const isDeal = !!(a.value && a.value.is_deal);
    const fresh = BATMapData.getEngagementFreshness(a, now, scrapedAt);
    let cls = "neutral";
    if (search) {
      if (a.id != null && matchedIds.has(a.id)) cls = "match";   // guard: a null id must not match a null in the Set
      else if (a.make && a.make.slug && similarMakes.has(a.make.slug)) cls = "similar";
      else cls = "other";
    }
    const item = search ? styleSearch(sp, a, cls, isDeal, usePhotos, RING)
                        : styleNeutral(sp, isDeal, fresh.hasData, fresh.stale, usePhotos, RING);
    tagItem(item, a, pt, fresh); item._cls = cls;
    return item;
  });
  // ECharts ignores per-item z within ONE series, so we order the draw ourselves: matches last
  // (on top of the dimmed "other"/"similar"), which also makes them win item-hover hit-testing.
  if (search) data.sort((p, q) => CLASS_RANK[p._cls] - CLASS_RANK[q._cls]);
  // X lower bound = just below the lowest plotted (winsorized) bid; no-bid cars already excluded.
  const xMin = priceAxisMin(pts);
  // Log y starts at the floor only when something actually sits there; otherwise let the data set it.
  const flooredZero = yLog && pts.some(p => p.y < Y_LOG_FLOOR);
  const yMin = yLog ? (flooredZero ? Y_LOG_FLOOR : "dataMin") : "dataMin";
  return { series: [{ type: "scatter", name: "auctions", data: data, large: false,
                      emphasis: { scale: 1.25 } }], usePhotos: usePhotos, xMin: xMin,
           yLog: yLog, yMin: yMin };
}

// Richly-encoded Comments field (the default home view, non-search, dots): price (log X) vs
// comments (log Y), colored by deal_pct, sized by watchers, with deal stars and median guides.
// Split into two scatter series so the visualMap colors ONLY the cars that have a deal_pct;
// the rest get a fixed neutral and are never clamped to a palette extreme.
function buildCommentsField(cars, now) {
  const pts = priceScatterPoints(BATMapData.buildPoints(cars, "comments", now));  // no-bid cars sit out
  const scrapedAt = SNAPSHOT && SNAPSHOT.scraped_at;
  const withDeal = [], noDeal = [];
  let flooredZero = false;
  for (const pt of pts) {
    const a = pt.car;
    if (pt.y < Y_LOG_FLOOR) flooredZero = true;
    const xv = winsorX(pt.x);                           // clamp into the $1k–$1M band (plot only)
    const yv = Math.max(pt.y, Y_LOG_FLOOR);            // a real 0 can't sit on a log axis
    const fresh = BATMapData.getEngagementFreshness(a, now, scrapedAt);
    const w = a.engagement && a.engagement.watchers;
    const rawDp = a.value && a.value.deal_pct;
    const dp = (rawDp != null && isFinite(rawDp)) ? rawDp : null;   // NaN/Infinity -> treat as missing
    const isDeal = !!(a.value && a.value.is_deal);
    // size by watchers (deal stars get a floor so they never shrink below notice)
    const size = isDeal ? Math.max(BATMapData.watcherSize(w), 16) : BATMapData.watcherSize(w);
    // low opacity + a thin dark hairline border read as DENSITY where dots overlap; deals get a glow.
    const style = isDeal
      ? { opacity: 0.95, borderColor: "#fff1c2", borderWidth: 1.4, shadowBlur: 12, shadowColor: "rgba(255,213,74,0.75)" }
      : { opacity: 0.55, borderColor: "#0f1115", borderWidth: 0.5 };
    // is_deal cars ALWAYS join the colored series, so a deal is never a gray dot and never buried under
    // the ungraded layer; a deal missing its deal_pct falls back to 0 ("at comps") for COLOR only —
    // the tooltip still reads the true value off the record.
    const dpColor = dp != null ? dp : (isDeal ? 0 : null);
    if (dpColor != null) {
      // visualMap (dimension 2) sets the FILL — store the value clamped to the palette domain so
      // outliers (e.g. +0.99 / -6.8) land on the extreme color instead of being filtered out.
      const item = { value: [xv, yv, BATMapData.clampNum(dpColor, BATMapData.DEAL_VMAP_MIN, BATMapData.DEAL_VMAP_MAX)],
                     symbol: isDeal ? "star" : "circle", symbolSize: size, itemStyle: style };
      tagItem(item, a, pt, fresh); item._cls = "neutral";
      withDeal.push(item);
    } else {
      const item = { value: [xv, yv], symbol: "circle", symbolSize: size,
                     itemStyle: Object.assign({ color: BATMapData.DEAL_NULL_COLOR }, style) };
      tagItem(item, a, pt, fresh); item._cls = "neutral";
      noDeal.push(item);
    }
  }
  // draw stars last within the colored series so they sit on top of the circle cloud
  withDeal.sort((p, q) => (p.symbol === "star" ? 1 : 0) - (q.symbol === "star" ? 1 : 0));
  // faint median quadrant guides — attached to the lower series so they sit UNDER the dots
  const markLine = {
    silent: true, symbol: "none", animation: false,
    lineStyle: { color: "#3a3f4b", type: "dashed", opacity: 0.5 },
    label: { color: "#9aa0ad", fontSize: 10, formatter: (o) => o.name },
    data: [
      { name: "median heat", yAxis: 16, label: { position: "insideEndTop" } },
      { name: "median price", xAxis: 11000, label: { position: "insideStartTop" } },
    ],
  };
  // Series order IS paint order: the ungraded (gray) layer draws first/underneath, the deal-graded
  // (colored + stars) layer draws on top — so deals and the color signal are never hidden by gray dots.
  const series = [
    { type: "scatter", name: "ungraded", data: noDeal, large: false, emphasis: { scale: 1.2 }, markLine: markLine },
    { type: "scatter", name: "deal-graded", data: withDeal, large: false, emphasis: { scale: 1.2 } },
  ];
  const visualMap = {
    show: true, type: "continuous", calculable: false, hoverLink: false,
    min: BATMapData.DEAL_VMAP_MIN, max: BATMapData.DEAL_VMAP_MAX,
    dimension: 2, seriesIndex: 1,                       // color ONLY the deal-graded series (now on top)
    inRange: { color: BATMapData.dealPaletteColors(20) },
    text: ["under comps", "over"], textGap: 8,
    textStyle: { color: "#9aa0ad", fontSize: 10 },
    itemWidth: 10, itemHeight: 118, right: 10, bottom: 46,
  };
  return { series: series, visualMap: visualMap,
           xMin: priceAxisMin(pts),                     // just below the lowest plotted (winsorized) bid
           yLog: true, yMin: flooredZero ? Y_LOG_FLOOR : "dataMin" };
}

// neutral (no search): the data-state styling — filled=activity, hollow=none, faded=stale, ring=deal.
function styleNeutral(pt, isDeal, hasActivity, stale, usePhotos, RING) {
  const a = pt.car;
  if (usePhotos && a.thumbnail_url) {
    return { value: [pt.x, pt.y], symbol: "image://" + a.thumbnail_url, symbolSize: [46, 34],
             itemStyle: { borderColor: isDeal ? RING : (hasActivity ? "#5b8def" : "#5a5f6b"),
                          borderWidth: isDeal ? 3 : 1.5, opacity: stale ? 0.5 : 1 } };
  }
  if (hasActivity) {
    // smaller + more translucent so the dense ~300-dot cloud reads as heat instead of occluding;
    // deals stay big with the gold ring so they still pop out of the cluster.
    return { value: [pt.x, pt.y], symbol: "circle", symbolSize: isDeal ? 15 : 9,
             itemStyle: { color: "#8b92a0", opacity: stale ? 0.4 : 0.7,
                          borderColor: isDeal ? RING : "#0f1115", borderWidth: isDeal ? 3 : 1 } };
  }
  return { value: [pt.x, pt.y], symbol: "circle", symbolSize: isDeal ? 15 : 10,
           itemStyle: { color: "transparent", borderColor: isDeal ? RING : "#5a5f6b",
                        borderWidth: isDeal ? 3 : 1.4, opacity: 0.9 } };   // hollow = no activity
}

// search: match (deal-tinted, shape-coded, prominent) / similar (muted) / other (faint context).
function styleSearch(pt, a, cls, isDeal, usePhotos, RING) {
  if (cls === "match") {
    const tier = BATMapData.dealTier(a);
    const color = TIER_COLOR[tier];
    const recessive = tier === "unknown";    // "comps pending" — let the green/amber/red signal pop
    if (usePhotos && a.thumbnail_url) {
      return { value: [pt.x, pt.y], symbol: "image://" + a.thumbnail_url, symbolSize: [50, 38],
               itemStyle: { borderColor: isDeal ? RING : color, borderWidth: isDeal ? 4 : 2.5, opacity: recessive ? 0.75 : 1 } };
    }
    return { value: [pt.x, pt.y], symbol: TIER_SYMBOL[tier], symbolSize: isDeal ? 16 : 12,  // shape carries buy/avoid
             itemStyle: { color: color, opacity: recessive ? 0.55 : 1,
                          borderColor: isDeal ? RING : "#0f1115", borderWidth: isDeal ? 3 : 1 } };
  }
  if (cls === "similar") {
    return { value: [pt.x, pt.y], symbol: "circle", symbolSize: 8,
             itemStyle: { color: "#8b92a0", opacity: 0.55, borderColor: "#0f1115", borderWidth: 0.5 } };
  }
  return { value: [pt.x, pt.y], symbol: "circle", symbolSize: 6,           // other = faint context
           itemStyle: { color: "#3a3f4a", opacity: 0.16, borderWidth: 0 } };
}

// Clean, currency-agnostic price ticks across the real range: 300, 1k, 10k, 100k, 1M.
function xTickFormatter(v) {
  return BATMapData.compactNumber(v);
}

// Clean multi-row tooltip: title, price (+ time left, since a bid is meaningless without the
// deadline), comments, watchers, deal %, mileage. Every value falls back to "—" when null.
// The fuller comp/condition breakdown lives in the click-card, keeping the hover light.
function tooltipFormatter(p) {
  const d = p.data;
  const img = d._img ? `<img src="${escapeHTML(d._img)}" style="width:208px;border-radius:6px;display:block;margin-bottom:6px">` : "";
  const row = (label, val, color) =>
    `<div style="display:flex;justify-content:space-between;gap:22px;line-height:1.55">`
    + `<span style="color:#9aa0ad">${label}</span>`
    + `<span style="color:${color || "#e7e9ee"};font-variant-numeric:tabular-nums">${val}</span></div>`;
  let timeLeft = "";
  const endMs = d._end ? Date.parse(d._end) : NaN;
  if (!isNaN(endMs)) {
    const left = endMs - Date.now();
    timeLeft = left > 0
      ? ` <span style="color:${left <= 3600000 ? "#e2553b" : "#9aa0ad"}">· ${fmtCountdown(left)} left</span>`
      : ` <span style="color:#9aa0ad">· ended</span>`;
  }
  const price = (d._noBid ? "No bid yet" : fmtMoney(d._p, d._cur)) + timeLeft;
  const comments = d._c != null ? Number(d._c).toLocaleString() : "—";
  const watchers = d._w != null ? Number(d._w).toLocaleString() : "—";
  const dp = d._v && d._v.deal_pct;
  const dealColor = dp == null ? "#9aa0ad" : (dp > 0 ? "#6fcf97" : (dp < 0 ? "#e2553b" : "#9aa0a8"));
  const miles = (d._d && fmtMiles(d._d)) ? escapeHTML(fmtMiles(d._d)) : "—";
  return img
    + `<div style="font-weight:600;max-width:230px;margin-bottom:5px">${escapeHTML(d._t || "")}</div>`
    + row("Price", price)
    + row("Comments", comments)
    + row("Watchers", watchers)
    + row("Deal", BATMapData.dealPctLabel(dp), dealColor)
    + row("Miles", miles)
    + `<div style="color:#7b8190;margin-top:6px">click for details</div>`;
}

function render() {
  const metric = document.getElementById("ymetric").value;
  const markers = document.getElementById("markers").value;
  const now = Date.now();
  const mobile = IS_MOBILE();
  const all = SNAPSHOT.auctions;
  // Advanced filters always hard-filter the board; search is layered on top as highlight + dim.
  const baseCars = window.BATFilters ? BATFilters.filterCars(all, currentSpec(), now) : all;
  const searchActive = !!(window.BATSearch && !BATSearch.isEmptySpec(SEARCH_SPEC));

  let displayCars, matchedIds = null, similarMakes = null, matched = baseCars;
  if (searchActive) {
    matched = BATFilters.filterCars(baseCars, SEARCH_SPEC, now);
    matchedIds = new Set(matched.map(c => c.id).filter(id => id != null));
    similarMakes = new Set(matched.map(c => c.make && c.make.slug).filter(Boolean));  // same make = "similar"
    // A broad keyword (e.g. "coupe") spans many makes, so "same make" would flood the view with
    // loosely-related cars. When the same-make set dwarfs the matches, drop the similar layer and
    // show just the matches — keeps "similar" meaningful and the phone decluttered.
    const similarCount = baseCars.filter(c => c.make && c.make.slug && similarMakes.has(c.make.slug) && !(c.id != null && matchedIds.has(c.id))).length;
    if (similarCount > Math.max(60, matched.length * 2)) similarMakes = new Set();
    displayCars = mobile
      ? baseCars.filter(c => (c.id != null && matchedIds.has(c.id)) || (c.make && c.make.slug && similarMakes.has(c.make.slug)))
      : baseCars;                             // desktop keeps the board; "other" is dimmed, not hidden
  } else {
    // empty search: desktop = whole board; mobile = a low-population teaser (today's deals, or
    // "closing within 24h" when comps are too thin to surface deals) + the prompt to search.
    displayCars = mobile ? mobileDefaultCars(baseCars, now) : baseCars;
  }

  FILTERED = searchActive ? matched : baseCars;      // List + ticker follow the searched cars
  updateFilterReadout(metric, now, { searchActive, matched, baseCars, similarMakes, mobile });
  buildTicker(FILTERED, now);
  if (listView) renderList();
  toggleColorLegend(searchActive);
  // The default home view (non-search Comments in dots mode) gets the rich encoding: deal-pct
  // color, watcher size, deal stars, median guides, and a deal-pct visualMap legend. Everything
  // else (search overlay, other Y-metrics, photo mode) keeps the existing single-series styling
  // and drops the visualMap — so the legend is hidden the moment you switch away from Comments.
  let useRich = !searchActive && metric === "comments" && markers !== "photos";
  if (useRich && markers === "auto") {
    const n = BATMapData.buildPoints(displayCars, "comments", now).length;
    if (BATMapData.chooseMarkerMode(n, mobile) === "photos") useRich = false;
  }
  let built, visualMap = null;
  if (useRich) {
    const r = buildCommentsField(displayCars, now);
    built = { series: r.series, xMin: r.xMin, yLog: r.yLog, yMin: r.yMin };
    visualMap = r.visualMap;
  } else {
    built = buildSeries(displayCars, metric, markers, now, { searchActive, matchedIds, similarMakes });
  }
  const yInverse = metric === "closing";    // soonest-ending at the TOP
  const yLog = built.yLog;                  // comments/watchers spread on a log axis
  chart.setOption({
    animationDurationUpdate: 0,   // instant, cursor-tight zoom/pan response
    tooltip: {
      trigger: "item",
      backgroundColor: "#16181f", borderColor: "#2a2e38", textStyle: { color: "#e7e9ee" },
      formatter: tooltipFormatter,
    },
    legend: { show: false },                  // no series legend; the visualMap (Comments) or per-point styling carries the key
    grid: { left: 70, right: visualMap ? 76 : 24, top: 18, bottom: 56 },  // room for the color legend
    xAxis: {
      // multi-currency board: native amount, no hardcoded $ sign on ticks.
      type: "log", name: "Current bid amount, native currency", nameLocation: "middle", nameGap: 34,
      axisLabel: { formatter: xTickFormatter },
      splitLine: { lineStyle: { color: "#1c1f27" } },
      min: built.xMin,            // dynamic: no-bid lane or smallest real bid (no hardcoded $1,000)
      // Pin the top to the data. The "nice" max sits above the priciest car, and ECharts snaps
      // any zoom whose endValue lands in that empty band back to full — which broke zoom-in.
      max: "dataMax",
    },
    yAxis: {
      // log for the right-skewed engagement metrics, linear (with a duration formatter) for
      // closing-time, linear for deal-% (it can be negative). Same axis-generic cursor zoom drives both.
      type: yLog ? "log" : "value", inverse: yInverse, name: metricAxisName(metric),
      nameLocation: "middle", nameGap: 48,
      axisLabel: metric === "closing" ? { formatter: (v) => BATMapData.formatDurationHours(v) }
               : (yLog ? { formatter: (v) => BATMapData.compactNumber(v) } : {}),
      splitLine: { lineStyle: { color: "#1c1f27" } },
      min: built.yMin, max: "dataMax",
    },
    // Three ways to zoom, so it never feels broken: ECharts' native wheel zoom
    // (reliable across mice/trackpads), the box-zoom tool below (drag a rectangle —
    // foolproof), and setupCursorZoom() which only intercepts trackpad PINCH
    // (ctrl+wheel) to stop the browser page-zooming. moveOnMouseMove = drag to pan.
    toolbox: {
      show: true, right: 10, top: 2, itemGap: 10,
      iconStyle: { borderColor: "#9aa0ad" },
      emphasis: { iconStyle: { borderColor: "#e7e9ee" } },
      feature: {
        dataZoom: { filterMode: "none", title: { zoom: "Box zoom — drag a box", back: "Undo zoom" } },
        restore: { title: "Reset zoom" },
      },
    },
    dataZoom: [
      // native wheel zoom OFF — setupCursorZoom drives it at a controlled speed. Drag-to-pan
      // (moveOnMouseMove, default true) stays with ECharts; box-zoom + reset are in the toolbox.
      { type: "inside", xAxisIndex: 0, filterMode: "none", zoomOnMouseWheel: false, moveOnMouseWheel: false },
      { type: "inside", yAxisIndex: 0, filterMode: "none", zoomOnMouseWheel: false, moveOnMouseWheel: false },
    ],
    // deal-pct color legend, only on the rich Comments view (notMerge below clears it otherwise)
    visualMap: visualMap ? [visualMap] : [],
    series: built.series,
  }, true);
}

// --- Ending-soon ticker (Phase 1): built from the snapshot we already loaded (zero new fetch).
// Window is 48h to match the is_deal definition, so every flagged deal appears. Scoped to the
// taste categories (like the map). The countdown is the only genuinely-live element.
const TICKER_WINDOW_MS = 48 * 3600 * 1000;
const TICKER_MAX = 60;            // cap chips so the marquee stays glanceable (deals sort first)
let tickerTimer = null;

function buildTicker(cars, now) {
  const el = document.getElementById("ticker");
  if (!el || !cars) return;
  now = now || Date.now();
  let items = [];
  for (const a of cars) {
    // ending-soon cars from the ACTIVE FILTER set (so the ticker matches the map/search, never
    // unrelated cars). Deals (no-reserve, under comps) sort to the front.
    const price = a.bid && a.bid.amount;
    if (!price || price <= 0) continue;
    const endMs = a.ends_at ? Date.parse(a.ends_at) : NaN;
    if (!endMs || endMs <= now || endMs - now > TICKER_WINDOW_MS) continue;  // ending within window, not ended
    const v = a.value || null;                                   // ~960 cars have value:null — guard it
    const scoreable = isScoreable(v);
    items.push({
      id: a.id,
      title: a.title || "",                                       // BaT titles already include the year
      url: a.listing_url, img: a.thumbnail_url,
      bid: price, cur: a.bid && a.bid.currency, endMs,
      scoreable,
      noReserve: !!(a.flags && a.flags.no_reserve),
      isDeal: !!(scoreable && v.is_deal),
      dealPct: scoreable ? Math.round(v.deal_pct * 100) : null,
      dealScore: scoreable && v.deal_score != null ? v.deal_score : null,  // condition-adjusted
      fairValue: scoreable ? v.fair_value : null,
      details: a.details || null,
    });
  }
  if (!items.length) { el.hidden = true; return; }               // fail-soft: no ticker, map still works
  // deals first (biggest discount), then everything else soonest-ending first
  const score = (it) => it.dealScore != null ? it.dealScore : (it.dealPct != null ? it.dealPct / 100 : 0);
  items.sort((x, y) => {
    if (x.isDeal !== y.isDeal) return x.isDeal ? -1 : 1;
    if (x.isDeal && y.isDeal) return score(y) - score(x);   // condition-adjusted deal_score
    return x.endMs - y.endMs;
  });
  const totalDeals = items.reduce((n, i) => n + (i.isDeal ? 1 : 0), 0);
  // cap a glanceable marquee — deals sort first, so the cap keeps every deal + the soonest cars
  items = items.slice(0, TICKER_MAX);

  applyDailyFlash(items);                                         // Phase 2: green/red daily diff
  const chips = items.map(chipHTML).join("");
  const label = `<div class="ticker-label">⏱ Ending soon`
    + (totalDeals ? ` · <span class="deals">${totalDeals} deal${totalDeals > 1 ? "s" : ""}</span>` : "")
    + `</div>`;
  const dur = Math.max(90, items.length * 7.2);                  // slower marquee (~3x original; constant regardless of count)
  // chips rendered twice so translateX(-50%) loops seamlessly
  el.innerHTML = label
    + `<div class="ticker-viewport"><div class="ticker-track" style="animation-duration:${dur}s">`
    + chips + chips
    + `</div></div>`;
  el.hidden = false;
  startTickerCountdown();
}

// Phase 2 green/red flash: diff each scoreable car's deal % against what we stored the last
// day the page was opened. Mutates items with a `.delta` (points moved). Fires only across a
// day boundary, only for scoreable cars, and persists today's values for tomorrow. localStorage
// only — no network, no timer.
function applyDailyFlash(items) {
  const KEY = "bat_ticker_prev_v1";
  const d = new Date();
  const today = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
  let prev = null;
  try { prev = JSON.parse(localStorage.getItem(KEY) || "null"); } catch (e) { prev = null; }
  const crossDay = !!(prev && prev.day && prev.day !== today);
  const current = {};
  for (const it of items) {
    if (it.scoreable && it.id != null) current[it.id] = it.dealPct;
  }
  if (crossDay && prev.values) {
    for (const it of items) {
      if (it.scoreable && it.id != null && prev.values[it.id] != null) {
        const delta = it.dealPct - prev.values[it.id];                // points the deal moved
        if (delta !== 0) it.delta = delta;
      }
    }
  }
  if (!prev || prev.day !== today) {
    try { localStorage.setItem(KEY, JSON.stringify({ day: today, values: current })); } catch (e) {}
  }
}

function chipHTML(it) {
  const safeUrl = /^https?:\/\//i.test(it.url || "") ? it.url : "#";   // no javascript: hrefs from scraped data
  const img = it.img
    ? `<img src="${escapeHTML(it.img)}" loading="lazy" referrerpolicy="no-referrer" alt="">` : "";
  let dealHTML;
  if (it.isDeal) {
    dealHTML = `<span class="ticker-tag">DEAL</span>`
      + `<span class="ticker-deal">${it.dealPct}% under</span>`;
  } else if (it.scoreable && it.noReserve && it.dealPct != null) {
    const above = it.dealPct < 0;                 // a real discount only on a no-reserve car
    dealHTML = `<span class="ticker-deal${above ? " above" : ""}">`
      + (above ? (-it.dealPct) + "% over" : it.dealPct + "% under") + `</span>`;
  } else if (it.scoreable) {
    // reserve car: show the comp market as context, never a discount (bid may be below reserve)
    dealHTML = `<span class="ticker-thin">comps ~${fmtMoney(it.fairValue, it.cur)}</span>`;
  } else {
    dealHTML = `<span class="ticker-thin">no comp est.</span>`;  // thin comps, no number
  }
  let deltaHTML = "", flashCls = "";
  if (it.delta != null && it.delta !== 0) {                       // moved since the last day you looked
    const up = it.delta > 0;                                      // deal improved (more under comps)
    deltaHTML = `<span class="ticker-delta ${up ? "up" : "down"}">${up ? "▲" : "▼"}${Math.abs(it.delta)}</span>`;
    flashCls = up ? " flash-up" : " flash-down";
  }
  // mileage + condition: the at-a-glance "is this worth a look" signal
  const milesTxt = fmtMiles(it.details);
  const milesHTML = milesTxt
    ? `<span class="ticker-miles${it.details && it.details.tmu ? " tmu" : ""}">${escapeHTML(milesTxt)}</span>` : "";
  const cs = condSplit(it.details && it.details.condition);
  let condHTML = "";
  if (cs.bad.length) condHTML = `<span class="ticker-flag">🚩${escapeHTML(cs.bad[0])}</span>`;
  else if (cs.good.length) condHTML = `<span class="ticker-good">${escapeHTML(cs.good[0])}</span>`;
  return `<a class="ticker-chip${it.isDeal ? " deal" : ""}${flashCls}" href="${escapeHTML(safeUrl)}" target="_blank" rel="noopener noreferrer">`
    + img
    + `<span class="ticker-name">${escapeHTML(it.title)}</span>`
    + `<span class="ticker-bid">${fmtMoney(it.bid, it.cur)}</span>`
    + milesHTML
    + condHTML
    + dealHTML
    + deltaHTML
    + `<span class="ticker-clock" data-ends="${it.endMs}"></span>`
    + `</a>`;
}

function fmtCountdown(ms) {
  if (ms <= 0) return "ENDED";
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600),
        m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (d > 0) return d + "d " + h + "h";
  if (h > 0) return h + "h " + m + "m";
  if (m > 0) return m + "m " + sec + "s";
  return sec + "s";
}
function tickCountdowns() {
  const now = Date.now();
  document.querySelectorAll("[data-ends]").forEach(el => {        // ticker clocks + card + list rows
    const left = Number(el.getAttribute("data-ends")) - now;
    el.textContent = fmtCountdown(left);
    el.classList.toggle("urgent", left > 0 && left <= 3600 * 1000);   // < 1h to go
    el.classList.toggle("lt-urgent", left > 0 && left <= 3600 * 1000);
  });
}
function startTickerCountdown() {
  if (tickerTimer) { clearInterval(tickerTimer); tickerTimer = null; }
  tickCountdowns();
  if (document.visibilityState === "visible") tickerTimer = setInterval(tickCountdowns, 1000);
}
document.addEventListener("visibilitychange", () => {
  const el = document.getElementById("ticker");
  const hidden = document.visibilityState !== "visible";
  if (el) el.classList.toggle("paused", hidden);                 // pause marquee when tab is hidden
  if (hidden) { if (tickerTimer) { clearInterval(tickerTimer); tickerTimer = null; } }
  else startTickerCountdown();                                    // resume clocks (ticker + card + list)
});

// hover preview: a big detailed photo when you hover a ticker chip. Lives on <body> (fixed)
// so it escapes the ticker strip's overflow:hidden; pointer-events:none so it never flickers.
(function setupTickerPreview() {
  const el = document.getElementById("ticker");
  const pv = document.getElementById("ticker-preview");
  if (!el || !pv) return;
  const img = pv.querySelector("img"), cap = pv.querySelector(".cap");

    cap.textContent = (chip.querySelector(".ticker-name") || {}).textContent || "";
    const r = chip.getBoundingClientRect();
    pv.style.left = Math.min(Math.max(8, r.left), window.innerWidth - W) + "px";
    pv.style.top = (r.bottom + 8) + "px";
    pv.hidden = false;
  });
  el.addEventListener("mouseleave", () => { pv.hidden = true; });
})();

// --- persistent detail card: a click pins a card (with the deadline + a "View on BaT"
// button) instead of jumping straight to the listing. Reused by the map and the list.
function carToCard(a) {
  return {
    _t: a.title, _y: a.year, _p: a.bid && a.bid.amount, _cur: a.bid && a.bid.currency,
    _c: a.engagement && a.engagement.comments, _w: a.engagement && a.engagement.watchers,
    _img: a.thumbnail_url, _url: a.listing_url, _v: a.value, _d: a.details,
    _nr: !!(a.flags && a.flags.no_reserve), _end: a.ends_at || null,
    _noBid: !(a.bid && a.bid.amount > 0),

function closeCard() { const c = document.getElementById("card"); if (c) c.hidden = true; }
function openCard(d) {
  const card = document.getElementById("card");
  if (!card || !d) return;
  const safeUrl = /^https?:\/\//i.test(d._url || "") ? d._url : null;
  const img = d._img ? `<img class="card-img" src="${escapeHTML(d._img)}" referrerpolicy="no-referrer" alt="">` : "";
  let clock = "";
  const endMs = d._end ? Date.parse(d._end) : NaN;
  if (endMs) {
    const left = endMs - Date.now();
    clock = left > 0
      ? `<div class="card-row">Ends in <span class="card-clock" data-ends="${endMs}">${fmtCountdown(left)}</span>`
        + ` <span class="card-muted">· ${new Date(endMs).toLocaleString()}</span></div>`
      : `<div class="card-row card-muted">Auction ended</div>`;
  }
  let vline = "";
  const v = d._v;
  if (v && v.fair_value && SCOREABLE_BASES[v.basis]) {        // only trusted comp bases quote a median
    const below = v.deal_pct != null ? Math.round(v.deal_pct * 100) : null;
    vline = `<div class="card-row">Comp median: <b>${fmtMoney(v.fair_value, d._cur)}</b> `
      + `<span class="card-muted">(${v.n_comps} comps, ${escapeHTML(friendlyBasis(v.basis))})</span></div>`;
    if (d._nr && below != null) {
      vline += `<div class="card-row">Bid is <b>${below >= 0 ? below + "% below" : (-below) + "% above"}</b> comps`
        + (v.is_deal ? ` · <span class="card-deal">DEAL — ending soon</span>` : "") + `</div>`;
    } else if (!d._nr) {
      vline += `<div class="card-row card-muted">Reserve auction — bid may be below reserve, not a discount</div>`;
    }
    if (v.appreciation_pct != null) {
      vline += `<div class="card-row card-muted">Recent trend: ${v.appreciation_pct >= 0 ? "+" : ""}${Math.round(v.appreciation_pct * 100)}%</div>`;
    }
  }
  let dline = "";
  const det = d._d;
  if (det) {
    const miles = fmtMiles(det), cs = condSplit(det.condition), parts = [];
    if (miles) parts.push(escapeHTML(miles));
    if (cs.bad.length) parts.push(`<span class="card-flag">🚩 ${escapeHTML(cs.bad.join(", "))}</span>`);
    if (cs.good.length) parts.push(`<span class="card-good">${escapeHTML(cs.good.join(", "))}</span>`);
    if (parts.length) dline = `<div class="card-row">${parts.join(" · ")}</div>`;
  }
  const btn = safeUrl
    ? `<a class="btn-link" href="${escapeHTML(safeUrl)}" target="_blank" rel="noopener noreferrer">View on BaT →</a>`
    : `<div class="card-row card-muted">No listing link</div>`;
  card.innerHTML =
    `<div class="card-close" role="button" aria-label="Close">✕</div>`
    + img
    + `<div class="card-title">${escapeHTML(d._t || "")}</div>`
    + `<div class="card-row">` + (d._noBid
        ? `<span class="card-bid">No bid yet</span>`
        : `<span class="card-bid">${fmtMoney(d._p, d._cur)}</span> <span class="card-muted">bid at last scan</span>`)
      + `</div>`
    + clock + dline + vline
    + `<div class="card-row card-muted">` + ((d._c != null || d._w != null)
        ? `${d._c ?? "—"} comments · ${d._w ?? "—"} watchers`
          + (d._fresh && d._fresh.label ? ` · updated ${escapeHTML(d._fresh.label)}` : "")
        : `Activity not scanned yet`)
      + `</div>`
    + btn;
  card.querySelector(".card-close").onclick = closeCard;
  card.hidden = false;
  startTickerCountdown();                   // keep the card's countdown ticking even if the ticker is hidden
}
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeCard(); });

// --- List view: a sortable table of the filtered cars (zoom-free drill-down).
const LIST_COLS = [
  { key: "name",     label: "Car" },
  { key: "price",    label: "Price",    num: true },
  { key: "ends",     label: "Ends",     num: true },
  { key: "deal",     label: "vs comps", num: true },
  { key: "watchers", label: "Watchers", num: true },
  { key: "comments", label: "Comments", num: true },
];
function listValue(a, key) {
  switch (key) {
    case "price": return (a.bid && a.bid.amount) || 0;
    case "ends": return a.ends_at ? Date.parse(a.ends_at) : Infinity;
    case "deal": return (a.value && a.value.deal_pct != null && a.flags && a.flags.no_reserve) ? a.value.deal_pct : -Infinity;
    case "watchers": return (a.engagement && a.engagement.watchers != null) ? a.engagement.watchers : -1;
    case "comments": return (a.engagement && a.engagement.comments != null) ? a.engagement.comments : -1;
    case "name": return (a.title || "").toLowerCase();
    default: return 0;
  }
}
function renderList() {
  const lp = document.getElementById("listpanel");
  if (!lp) return;
  // the List shows the ACTIVE filtered board (ended-since-scan cars are dropped, like the map)
  const rows = BATMapData.getActiveAuctions(FILTERED, Date.now()).sort((x, y) => {
    const a = listValue(x, listSort.key), b = listValue(y, listSort.key);
    const c = a < b ? -1 : a > b ? 1 : 0;
    return listSort.dir === "asc" ? c : -c;
  });
  const head = LIST_COLS.map(col => {
    const sorted = col.key === listSort.key ? " sorted" + (listSort.dir === "asc" ? " asc" : "") : "";
    return `<th class="${col.num ? "num" : ""}${sorted}" data-key="${col.key}">${col.label}</th>`;
  }).join("");
  const body = rows.slice(0, 400).map((a, i) => {
    const endMs = a.ends_at ? Date.parse(a.ends_at) : NaN;
    const clock = endMs ? `<span data-ends="${endMs}">${fmtCountdown(endMs - Date.now())}</span>` : "—";
    const v = a.value, nr = !!(a.flags && a.flags.no_reserve);
    let deal = "—";
    if (v && v.deal_pct != null && nr) {
      const pct = Math.round(v.deal_pct * 100);
      deal = pct >= 0 ? `<span class="lt-deal">${pct}% under</span>` : `<span class="lt-over">${-pct}% over</span>`;
    } else if (v && v.fair_value) {
      deal = `<span class="lt-over">comps ~${fmtMoney(v.fair_value, a.bid && a.bid.currency)}</span>`;
    }
    const miles = fmtMiles(a.details);
    const img = a.thumbnail_url
      ? `<img class="lt-img" src="${escapeHTML(a.thumbnail_url)}" loading="lazy" referrerpolicy="no-referrer" alt="">` : "";
    return `<tr data-i="${i}">`
      + `<td><div style="display:flex;align-items:center;gap:8px">${img}<span class="lt-name">${escapeHTML(a.title || "")}`
        + `${miles ? ` <span class="card-muted">· ${escapeHTML(miles)}</span>` : ""}</span></div></td>`
      + `<td class="num">${a.bid && a.bid.amount > 0 ? fmtMoney(a.bid.amount, a.bid.currency) : "<span class='card-muted'>No bid</span>"}</td>`
      + `<td class="num">${clock}</td>`
      + `<td class="num">${deal}</td>`
      + `<td class="num">${(a.engagement && a.engagement.watchers) ?? "—"}</td>`
      + `<td class="num">${(a.engagement && a.engagement.comments) ?? "—"}</td>`
      + `</tr>`;
  }).join("");
  lp.innerHTML =
    `<div class="card-muted" style="padding:8px 0">${rows.length} cars`
      + `${rows.length > 400 ? " (showing first 400)" : ""} · click a row for details</div>`
    + `<table class="listtbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  lp.querySelectorAll("th").forEach(th => th.onclick = () => {
    const key = th.getAttribute("data-key");
    if (listSort.key === key) listSort.dir = listSort.dir === "asc" ? "desc" : "asc";
    else { listSort.key = key; listSort.dir = (key === "ends" || key === "name") ? "asc" : "desc"; }
    renderList();
  });
  lp.querySelectorAll("tbody tr").forEach(tr => tr.onclick = () =>
    openCard(carToCard(rows[Number(tr.getAttribute("data-i"))])));
  startTickerCountdown();
}

// --- search controller. Two layers, matched LOCALLY (the LLM, when wired, only returns a spec;
// it never matches cars). currentSpec() = the Advanced manual filters, which HARD-filter the
// board (baseCars). SEARCH_SPEC = the search box (keyword now, validated LLM spec later), applied
// as a highlight/dim overlay on top — never a hard filter. There is no separate "LLM results" list.
let SEARCH_SPEC = {};
const SEARCH_ENDPOINT = (function () {
  const m = document.querySelector('meta[name="bat-search-endpoint"]');
  return String(window.BAT_SEARCH_ENDPOINT || (m && m.getAttribute("content")) || "").trim();
})();

function setSearchSummary(text, isErr) {
  const el = document.getElementById("q-summary");
  if (!el) return;
  el.textContent = text || "";
  el.classList.toggle("err", !!isErr);
}
function renderSearchChips() {
  const wrap = document.getElementById("q-chips");
  if (!wrap) return;
  wrap.innerHTML = "";
  const chips = window.BATSearch ? BATSearch.specConstraints(SEARCH_SPEC) : [];
  for (const ch of chips) {
    const el = document.createElement("span");
    el.className = "chip active"; el.textContent = ch.label;
    const x = document.createElement("span");
    x.className = "x"; x.textContent = "✕";
    x.onclick = () => removeSearchConstraint(ch);
    el.appendChild(x);
    wrap.appendChild(el);
  }
}
function removeSearchConstraint(ch) {
  if (ch.field === "termGroups" && typeof ch.index === "number") {
    SEARCH_SPEC.termGroups = (SEARCH_SPEC.termGroups || []).filter((_, i) => i !== ch.index);
    if (!SEARCH_SPEC.termGroups.length) delete SEARCH_SPEC.termGroups;
  } else {
    delete SEARCH_SPEC[ch.field];
  }
  renderSearchChips();
  render();
}
function clearSearch() {
  SEARCH_SPEC = {};
  const q = document.getElementById("q"); if (q) q.value = "";
  setSearchSummary("");
  renderSearchChips();
}
async function runSearch() {
  const q = (document.getElementById("q").value || "").trim();
  if (!q) { clearSearch(); render(); return; }
  if (!window.BATSearch) return;
  setSearchSummary("Searching…");
  const catalog = BATSearch.buildCatalog(SNAPSHOT.auctions);
  let result;
  try {
    result = await BATSearch.interpretSearch(q, { endpoint: SEARCH_ENDPOINT, catalog });
  } catch (e) {
    result = { spec: BATSearch.basicKeywordSpec(q), source: "keyword", error: "search failed" };
  }
  SEARCH_SPEC = result.spec || {};
  const note = result.source === "llm" ? "" : "Keyword search · ";
  const err = result.error && result.source !== "keyword";
  setSearchSummary((result.error ? result.error + " — " : "") + note + (result.summary || BATSearch.formatSearchSummary(SEARCH_SPEC)), err);
  renderSearchChips();
  render();
}
(function setupSearch() {

  if (q) q.placeholder = "What kind of car are you looking for?";   // honest prefix lives in the summary
  if (form) form.addEventListener("submit", (e) => { e.preventDefault(); runSearch(); });

// --- filter controller (pivot): one spec, read from the bar, written by chips/presets/saved views
const SAVED_KEY = "bat_saved_views_v1";
let activePreset = null;   // a category id for a one-tap preset, or null

function debounce(fn, ms) { let t; return function () { clearTimeout(t); t = setTimeout(fn, ms); }; }

function currentSpec() {
  const v = id => (document.getElementById(id).value || "").trim();
  const n = id => { const x = v(id); return x ? Number(x) : null; };
  const spec = {};
  const mk = v("f-make");
  if (mk) spec.makes = mk.toLowerCase().split(/[,\s]+/).filter(Boolean);
  const ymin = n("f-yearmin"); if (ymin) spec.yearMin = ymin;
  const ymax = n("f-yearmax"); if (ymax) spec.yearMax = ymax;
  const pmax = n("f-pricemax"); if (pmax) spec.priceMax = pmax;
  const mmax = n("f-milesmax"); if (mmax) spec.milesMax = mmax;
  if (document.getElementById("f-noreserve").checked) spec.noReserve = true;

}

function updateFilterReadout(metric, now, ctx) {
  const el = document.getElementById("f-count");
  if (!el) return;
  const fmt = (n) => Number(n).toLocaleString();
  let msg;
  if (ctx.searchActive) {
    // count the cars actually PLOTTED on this axis (drops ended + metric-less), so the number
    // equals the dots on screen.
    const matchPts = BATMapData.buildPoints(ctx.matched, metric, now);
    const m = matchPts.length;
    if (m === 0) {
      msg = "No matches — try fewer or different words";
    } else {
      const activeBase = BATMapData.getActiveAuctions(ctx.baseCars, now);
      const similar = activeBase.filter(c => c.make && c.make.slug && ctx.similarMakes.has(c.make.slug)
                          && !(c.id != null && new Set(ctx.matched.map(x => x.id)).has(c.id))).length;
      // most matches have no trusted comps yet, so the green/amber/red tint only means something
      // for a few — say how many, honestly (same idiom as the mileage/deal readouts).
      const graded = matchPts.filter(p => BATMapData.dealTier(p.car) !== "unknown").length;
      msg = `${fmt(m)} match${m === 1 ? "" : "es"}`
        + (graded > 0 ? ` · comp grade for ${fmt(graded)}` : ` · comps pending`)
        + (similar > 0 ? ` · ${fmt(similar)} similar (same make)` : "")
        + (ctx.mobile ? "" : ` · rest dimmed`);
    }
  } else {
    const cars = ctx.baseCars;
    const active = BATMapData.getActiveAuctions(cars, now).length;
    const plottable = BATMapData.buildPoints(cars, metric, now).length;
    if (ctx.mobile) {
      const deals = activeDeals(cars, now).length;
      msg = (deals >= MOBILE_DEALS_MIN)
        ? `${fmt(deals)} deals shown · search to see the whole board`
        : `${fmt(cars.filter(c => endsWithin(c, now, 24)).length)} closing within 24h · search to see the whole board`;
    } else if (metric === "closing") {
      const ended = cars.length - active;
      msg = `${fmt(active)} active auctions shown` + (ended > 0 ? ` · ${fmt(ended)} ended since the last scan` : "");
    } else if (metric === "deal") {
      msg = `${fmt(plottable)} trusted no-reserve comp matches shown · ${fmt(active - plottable)} other active auctions`;
    } else {
      // Only ~300 cars get enriched per scan, so the rest have no comment/watcher number YET —
      // they're un-scanned, not dropped. Say so plainly and point to the axis that shows all of them.
      const label = metric === "watchers" ? "watcher" : "comment";
      const missing = active - plottable;
      msg = `${fmt(plottable)} shown · ${fmt(missing)} live auctions not yet scanned for ${label}s`
        + (missing > 0 ? ` — pick “Closing soon” to see all ${fmt(active)}` : "");
    }
  }
  const man = currentSpec();
  if (man.milesMax != null && window.BATFilters) {                  // 1C-A honesty: say where the data is
    msg += ` · mileage known for ${BATFilters.knownCount(ctx.baseCars, "miles")}`;
  }
  el.textContent = msg;
}

// active auction whose end is within `hours` of `now` (used for the mobile low-population default)
function endsWithin(car, now, hours) {
  const e = Date.parse(car.ends_at);
  return !isNaN(e) && e > now && (e - now) <= hours * 3600 * 1000;
}

// Mobile, no search: a small high-value teaser so the phone isn't a wall of dots. Today's
// deals if there are enough; otherwise everything closing within 24h.
const MOBILE_DEALS_MIN = 12;
function activeDeals(cars, now) {                  // is_deal AND still live (matches what the map plots)
  return BATMapData.getActiveAuctions(cars, now).filter(c => c.value && c.value.is_deal);
}
function mobileDefaultCars(base, now) {
  const deals = activeDeals(base, now);
  return deals.length >= MOBILE_DEALS_MIN ? deals : base.filter(c => endsWithin(c, now, 24));
}

// Color key, shown only while a search is active so the tinting has a legend.
function toggleColorLegend(on) {
  const el = document.getElementById("colorlegend");
  if (!el) return;
  el.classList.toggle("on", !!on);
  if (on && !el.dataset.built) {
    // glyph mirrors the on-map symbol so the buy/avoid read survives red-green colorblindness
    const tier = (g, c, label) => `<span class="sw"><span class="glyph" style="color:${c}">${g}</span>${label}</span>`;
    el.innerHTML =
      tier(TIER_GLYPH.under, "#28b487", "match · under comps")
      + tier(TIER_GLYPH.over, "#e2553b", "match · over comps")
      + tier(TIER_GLYPH.fair, "#e0a13a", "match · fair")
      + tier(TIER_GLYPH.unknown, "#5b8def", "match · comps pending")
      + `<span class="sw"><span class="dot" style="background:#8b92a0"></span>similar (same make)</span>`
      + `<span class="sw"><span class="dot" style="background:#3a3f4a"></span>rest of board</span>`
      + `<span class="sw"><span class="dot ring" style="background:#28b487"></span>gold ring = deal, closing soon</span>`;
    el.dataset.built = "1";
  }
}

function loadSaved() { try { return JSON.parse(localStorage.getItem(SAVED_KEY) || "[]"); } catch (e) { return []; } }
function storeSaved(list) { try { localStorage.setItem(SAVED_KEY, JSON.stringify(list.slice(0, 20))); } catch (e) {} }

function renderChips() {
  const wrap = document.getElementById("chips");
  if (!wrap) return;
  wrap.innerHTML = "";
  // Category presets are gone from primary navigation (the board is no longer organized by the
  // five placeholder categories). Only the user's own saved views remain as chips.
  for (const view of loadSaved()) {
    const c = document.createElement("span");
    c.className = "chip"; c.textContent = view.name;
    c.onclick = () => { if (typeof clearSearch === "function") clearSearch(); applySpec(view.spec); renderChips(); render(); };
    const x = document.createElement("span");
    x.className = "x"; x.textContent = "✕";
    x.onclick = (e) => { e.stopPropagation(); storeSaved(loadSaved().filter(v => v.name !== view.name)); renderChips(); };
    c.appendChild(x);
    wrap.appendChild(c);
  }
}

function setupFilters(cars) {
  const counts = {};
  for (const a of cars) { const m = a.make && a.make.slug; if (m) counts[m] = (counts[m] || 0) + 1; }
  const dl = document.getElementById("makes");
  Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 60).forEach(m => {
    const o = document.createElement("option"); o.value = m; dl.appendChild(o);
  });
  ["f-make", "f-yearmin", "f-yearmax", "f-pricemax", "f-milesmax"].forEach(
    id => document.getElementById(id).addEventListener("input", debounce(render, 200)));
  ["f-noreserve", "f-deals"].forEach(id => document.getElementById(id).addEventListener("change", render));
  document.getElementById("f-clear").onclick = () => { applySpec({}); renderChips(); render(); };
  document.getElementById("f-save").onclick = () => {
    const name = (prompt("Name this view (e.g. \"Dad: cheap trucks\"):") || "").trim();
    if (!name) return;
    const list = loadSaved().filter(v => v.name !== name);
    list.unshift({ name, spec: currentSpec() });
    storeSaved(list); renderChips();
  };
  renderChips();
}

(async function init() {
  // Self-heal a stale cached script: a freshly-deployed index.html can load against an OLD cached
  // map-data.js that lacks newer exports (e.g. clampNum) -> render() throws -> blank chart. Detect
  // the mismatch and do ONE cache-busted reload; the ?fresh= already in the URL guards the loop.
  const scriptsStale = !window.BATMapData || typeof BATMapData.clampNum !== "function"
                    || !window.BATFilters || !window.BATSearch;
  const alreadyRetried = location.search.indexOf("fresh=") !== -1;
  if (scriptsStale && !alreadyRetried) {
    location.replace(location.pathname + "?fresh=" + Date.now());   // fresh index.html + fresh ?v= scripts
    return;
  }
  if (scriptsStale) {
    statusEl.innerHTML = "The map's scripts didn't load correctly — a cached file looks stale.<br>"
      + "Please hard-refresh to clear it: <b>Cmd/Ctrl + Shift + R</b>.";
    return;
  }
  SNAPSHOT = await loadData();
  if (!SNAPSHOT) {
    chart.dispose();
    statusEl.innerHTML =
      "Couldn't load <code>data/auctions.json</code>.<br><br>"
      + "Run the scraper, then serve over http (file:// is blocked by the browser):<br>"
      + "<code>python -m scraper</code><br>"
      + "<code>python3 -m http.server</code> &nbsp;then open <code>http://localhost:8000/web/</code>";
    metaEl.textContent = "no data";
    return;
  }
  const all = SNAPSHOT.auctions;
  const now = Date.now();
  const active = BATMapData.getActiveAuctions(all, now).length;
  const withEng = all.filter(a => a.engagement && (a.engagement.comments != null || a.engagement.watchers != null)).length;
  metaEl.innerHTML = `${active.toLocaleString()} active auctions · whole live board · ${withEng.toLocaleString()} with activity data `
    + `· scanned ${SNAPSHOT.scraped_at ? new Date(SNAPSHOT.scraped_at).toLocaleString() : "?"}`;
  if (!all.length) {
    statusEl.innerHTML = "Snapshot loaded but no cars to plot.";
    return;
  }
  setupFilters(all);
  try {
    render();               // render() builds the ticker from the active filter set
  } catch (e) {
    // Never leave a silent blank map. The usual culprit is a stale cached script paired with a
    // freshly-deployed page, so point the user at a hard refresh first.
    if (window.console) console.error("render() failed:", e);
    statusEl.innerHTML = "Couldn't draw the map. If the site just updated, hard-refresh to clear a "
      + "stale cached script: <b>Cmd/Ctrl + Shift + R</b>.<br><br><code>"
      + escapeHTML(String((e && e.message) || e)) + "</code>";
  }
})();
</script>
